<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAP.VIZ</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04050a;--a:#ffb229;--ad:#a06800;
  --g:#4ade80;--r:#f43f5e;--p:#a855f7;
  --b:#60a5fa;--c:#22d3ee;--o:#f97316;--dim:rgba(255,178,41,.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--a);font-family:'Share Tech Mono',monospace;}
@keyframes flicker{0%,93%{filter:brightness(1);}94%{filter:brightness(.6);}95%{filter:brightness(1);}}
@keyframes scan{from{top:0}to{top:100vh}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
#crt{width:100vw;height:100vh;display:flex;flex-direction:column;animation:flicker .22s steps(1) infinite;}
#scanline{position:fixed;top:0;left:0;right:0;height:2px;background:rgba(255,178,41,.04);pointer-events:none;z-index:999;animation:scan 8s linear infinite;}
#vignette{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 57%,rgba(0,0,0,.74) 100%);pointer-events:none;z-index:998;}
#noise{position:fixed;inset:0;pointer-events:none;z-index:997;opacity:.027;}
#ca{position:fixed;inset:0;pointer-events:none;z-index:1000;opacity:0;transition:opacity .04s;}
#ca.on{opacity:1;box-shadow:inset -7px 0 0 rgba(255,0,0,.38),inset 7px 0 0 rgba(0,60,255,.33);}

/* ── BOOT ── */
#boot{position:fixed;inset:0;background:var(--bg);z-index:900;display:flex;flex-direction:column;align-items:center;justify-content:center;}
#bl{font-family:'VT323';font-size:104px;color:var(--a);text-shadow:0 0 50px var(--a),0 0 100px rgba(255,178,41,.26);letter-spacing:10px;}
#bs{font-size:11px;letter-spacing:7px;color:var(--ad);margin-bottom:44px;}
#blog{width:640px;max-width:92vw;font-size:12px;line-height:2.1;}
.bline{opacity:0;display:flex;justify-content:space-between;gap:16px;}.bline.v{opacity:1;}.bok{color:var(--g);}
#bprog{width:640px;max-width:92vw;height:2px;background:rgba(255,178,41,.1);margin-top:22px;}
#bfill{height:100%;width:0;background:var(--a);box-shadow:0 0 8px var(--a);transition:width .1s;}
@keyframes blink{50%{opacity:0}}.bcur{display:inline-block;width:8px;height:13px;background:var(--a);animation:blink .7s step-end infinite;vertical-align:middle;}

/* ── MAIN ── */
#main{display:none;flex:1;flex-direction:column;height:100vh;}
#main.show{display:flex;animation:fadein .4s ease;}

/* HEADER */
#hdr{height:42px;display:flex;align-items:center;gap:8px;padding:0 12px;border-bottom:1px solid rgba(255,178,41,.2);background:rgba(0,0,0,.7);flex-shrink:0;}
#logo{font-family:'VT323';font-size:30px;color:var(--a);text-shadow:0 0 16px var(--a);letter-spacing:4px;}
#tabs{display:flex;gap:3px;flex:1;overflow-x:auto;}
#tabs::-webkit-scrollbar{display:none;}
.tab{font-size:9px;padding:3px 10px;border:1px solid rgba(255,178,41,.2);color:var(--ad);cursor:pointer;letter-spacing:1.5px;white-space:nowrap;transition:all .1s;flex-shrink:0;}
.tab:hover,.tab.active{border-color:var(--a);color:var(--a);background:rgba(255,178,41,.08);}
#snd{font-size:14px;background:transparent;border:1px solid rgba(255,178,41,.18);color:var(--a);padding:2px 7px;cursor:pointer;}

/* PANELS */
#panels{display:flex;flex:1;overflow:hidden;}

/* ━━━━━━━━━━━━━━━ LEFT (canvas) 36% ━━━━━━━━━━━━━━━ */
#left{width:36%;min-width:320px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid rgba(255,178,41,.12);}
#viz{flex:1;overflow:hidden;position:relative;}
#vc{display:block;width:100%;height:100%;}
#pbar-wrap{height:2px;background:rgba(255,178,41,.06);flex-shrink:0;}
#pbar{height:100%;width:0;background:var(--a);transition:width .18s;}
/* stats */
#stats{display:flex;gap:10px;padding:4px 10px;border-top:1px solid rgba(255,178,41,.08);background:rgba(0,0,0,.3);flex-shrink:0;flex-wrap:wrap;}
.si{display:flex;gap:4px;align-items:baseline;}
.sl{font-size:7px;color:var(--ad);letter-spacing:1.5px;}
.sv{font-family:'VT323';font-size:18px;color:var(--a);}
/* controls */
#ctrl{display:flex;align-items:center;gap:5px;padding:4px 10px;border-top:1px solid rgba(255,178,41,.1);background:rgba(0,0,0,.35);flex-shrink:0;flex-wrap:wrap;}
.cb{font-family:'VT323';font-size:13px;padding:2px 9px;border:1px solid rgba(255,178,41,.28);background:transparent;color:var(--a);cursor:pointer;transition:.1s;white-space:nowrap;}
.cb:hover{background:rgba(255,178,41,.07);}
#pb.pl{color:var(--r);border-color:var(--r);}
.csep{width:1px;height:14px;background:rgba(255,178,41,.1);}
input[type=range]{-webkit-appearance:none;width:52px;height:2px;background:rgba(255,178,41,.2);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--a);cursor:pointer;}
#sc{font-family:'VT323';font-size:13px;color:var(--ad);}
#kb{display:flex;gap:8px;padding:2px 10px;background:rgba(0,0,0,.4);border-top:1px solid rgba(255,178,41,.05);flex-shrink:0;flex-wrap:wrap;}
.kh{font-size:7px;color:rgba(255,178,41,.22);}.kk{border:1px solid rgba(255,178,41,.12);padding:0 3px;font-size:7px;}

/* ━━━━━━━━━━━━━━━ RIGHT 64% ━━━━━━━━━━━━━━━ */
#right{flex:1;display:flex;flex-direction:column;overflow:hidden;background:rgba(0,0,0,.12);}

/* ── CODE SECTION (always visible, big) ── */
#code-section{flex:0 0 52%;display:flex;flex-direction:column;border-bottom:2px solid rgba(255,178,41,.18);overflow:hidden;}
#code-hdr{height:28px;display:flex;align-items:center;gap:10px;padding:0 14px;background:rgba(0,0,0,.55);border-bottom:1px solid rgba(255,178,41,.12);flex-shrink:0;}
#code-hdr-title{font-size:9px;letter-spacing:3px;color:var(--ad);}
#code-hdr-file{font-size:9px;color:rgba(255,178,41,.25);margin-left:auto;font-family:'IBM Plex Mono';}
#code-area{flex:1;overflow-y:auto;font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:1.9;padding:4px 0;}
#code-area::-webkit-scrollbar{width:4px;}
#code-area::-webkit-scrollbar-thumb{background:rgba(255,178,41,.18);}
.cl{display:flex;padding:1px 6px 1px 0;white-space:pre;border-left:3px solid transparent;}
.cl.act{background:rgba(255,178,41,.09);border-left-color:var(--a);}
.cl:hover{background:rgba(255,178,41,.035);}
.ln{color:rgba(255,178,41,.2);width:28px;text-align:right;margin-right:12px;user-select:none;flex-shrink:0;font-size:11px;}
.cl.act .ln{color:rgba(255,178,41,.55);}
.kw{color:#c678dd;}.str{color:#98c379;}.nm{color:#d19a66;}.fn{color:#61afef;}.cm{color:#4a5e6a;font-style:italic;}.op{color:#56b6c2;}.tp{color:#e5c07b;}

/* ── BOTTOM SECTION ── */
#bottom-section{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* Step explanation — ALWAYS VISIBLE, PROMINENT */
#explain-bar{flex:0 0 auto;border-bottom:1px solid rgba(255,178,41,.14);background:rgba(0,0,0,.38);overflow:hidden;}
#explain-inner{padding:12px 18px 14px;}
.expl-row1{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.badge{font-family:'VT323';font-size:14px;padding:2px 10px;border:1px solid;letter-spacing:3px;flex-shrink:0;}
.badge.init{color:var(--ad);border-color:var(--ad);}
.badge.hash{color:var(--b);border-color:var(--b);background:rgba(96,165,250,.08);}
.badge.insert{color:var(--g);border-color:var(--g);background:rgba(74,222,128,.07);}
.badge.lookup{color:var(--c);border-color:var(--c);background:rgba(34,211,238,.07);}
.badge.grow{color:var(--o);border-color:var(--o);background:rgba(249,115,22,.08);}
.badge.evac{color:var(--p);border-color:var(--p);background:rgba(168,85,247,.07);}
.badge.crash{color:var(--r);border-color:var(--r);background:rgba(244,63,94,.1);}
.badge.warn{color:var(--o);border-color:var(--o);}
.badge.done{color:var(--g);border-color:var(--g);}
#expl-step{font-size:9px;color:var(--ad);}
#expl-title{font-family:'VT323';font-size:22px;color:var(--a);letter-spacing:2px;}
#expl-body{font-size:13px;line-height:1.75;color:rgba(255,178,41,.82);}
#expl-insight{margin-top:9px;padding:7px 12px;border:1px solid rgba(255,178,41,.2);background:rgba(255,178,41,.03);font-size:11.5px;color:rgba(255,178,41,.6);line-height:1.6;border-left:3px solid var(--a);}
#expl-insight strong{color:var(--a);}
#expl-insight code{font-family:'IBM Plex Mono';font-size:11px;color:var(--c);background:rgba(34,211,238,.07);padding:1px 4px;}

/* Tabs panel below explanation */
#bot-tabs-bar{display:flex;border-bottom:1px solid rgba(255,178,41,.12);background:rgba(0,0,0,.5);flex-shrink:0;}
.btab{flex:1;font-size:9px;padding:5px 4px;text-align:center;letter-spacing:1.5px;color:var(--ad);cursor:pointer;border-right:1px solid rgba(255,178,41,.07);transition:.1s;}
.btab:last-child{border-right:none;}
.btab:hover,.btab.active{color:var(--a);background:rgba(255,178,41,.06);}
.btab.active{border-bottom:2px solid var(--a);}
#bot-panels{flex:1;overflow:hidden;position:relative;}
.bpanel{position:absolute;inset:0;display:none;overflow-y:auto;flex-direction:column;}
.bpanel.active{display:flex;}
.bpanel::-webkit-scrollbar{width:4px;}
.bpanel::-webkit-scrollbar-thumb{background:rgba(255,178,41,.15);}

/* ── USAGE EXAMPLES ── */
.uex{border-bottom:1px solid rgba(255,178,41,.08);}
.uex-hdr{padding:8px 16px 3px;background:rgba(74,222,128,.03);border-left:3px solid var(--g);}
.uex-num{font-size:9px;color:rgba(74,222,128,.4);letter-spacing:1px;}
.uex-title{font-size:12.5px;color:var(--g);letter-spacing:.5px;margin-top:1px;}
.uex-sub{font-size:10px;color:rgba(74,222,128,.45);margin-top:1px;}
.uex-code{font-family:'IBM Plex Mono';font-size:11.5px;line-height:1.72;padding:9px 16px 10px;color:rgba(255,178,41,.78);white-space:pre;}
.uex-note{font-size:10.5px;color:rgba(255,178,41,.35);padding:0 16px 9px;font-style:italic;border-bottom:none;}

/* ── INFO: CONCEPTS ── */
.icon-row{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(255,178,41,.07);}
.icon-row strong{color:#ffcc55;display:block;font-size:11px;margin-bottom:2px;}
.icon-row p{font-size:11.5px;line-height:1.7;color:rgba(255,178,41,.72);}
.icon-row code{font-family:'IBM Plex Mono';font-size:10.5px;color:var(--c);background:rgba(34,211,238,.07);padding:1px 4px;}
.info-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.info-section{padding:10px 16px;border-bottom:1px solid rgba(255,178,41,.07);}
.info-section h3{font-family:'VT323';font-size:14px;letter-spacing:3px;color:var(--a);margin-bottom:6px;}
.info-section p{font-size:12px;line-height:1.75;color:rgba(255,178,41,.72);}
.info-section code{font-family:'IBM Plex Mono';font-size:11px;color:var(--c);background:rgba(34,211,238,.07);padding:1px 4px;}

/* ── GOTCHAS ── */
.trap{margin:8px 12px;padding:10px 12px;border:1px solid;font-size:12px;line-height:1.7;display:flex;gap:10px;}
.trap.warn{border-color:rgba(244,63,94,.35);background:rgba(244,63,94,.04);}
.trap.ok{border-color:rgba(74,222,128,.28);background:rgba(74,222,128,.03);}
.trap.info{border-color:rgba(255,178,41,.18);background:rgba(255,178,41,.02);}
.trap.note{border-color:rgba(96,165,250,.28);background:rgba(96,165,250,.03);}
.trap-icon{font-size:16px;flex-shrink:0;}
.trap-body strong{color:#ffcc55;display:block;margin-bottom:2px;font-size:11px;letter-spacing:.5px;}
.trap-body{font-size:11.5px;color:rgba(255,178,41,.75);}
.trap-body code{font-family:'IBM Plex Mono';font-size:10.5px;color:var(--c);background:rgba(34,211,238,.07);padding:1px 4px;}

/* syntax in uex */
.uex-code .kw{color:#c678dd;}.uex-code .str{color:#98c379;}.uex-code .nm{color:#d19a66;}
.uex-code .fn{color:#61afef;}.uex-code .cm{color:#4a5e6a;font-style:italic;}
.uex-code .r{color:var(--r);}.uex-code .g{color:var(--g);}.uex-code .o{color:var(--o);}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(255,178,41,.15);}
</style>
</head>
<body>
<canvas id="noise"></canvas>
<div id="scanline"></div>
<div id="vignette"></div>
<div id="ca"></div>

<div id="boot">
  <div id="bl">MAP.VIZ</div>
  <div id="bs">GO RUNTIME HASHMAP — INTERNALS FROM SOURCE</div>
  <div id="blog"></div>
  <div id="bprog"><div id="bfill"></div></div>
</div>

<div id="crt"><div id="main">
  <div id="hdr">
    <div id="logo">MAP.VIZ</div>
    <div id="tabs"></div>
    <button id="snd" onclick="toggleMute()">🔊</button>
  </div>
  <div id="panels">

    <!-- LEFT -->
    <div id="left">
      <div id="viz"><canvas id="vc"></canvas></div>
      <div id="pbar-wrap"><div id="pbar"></div></div>
      <div id="stats">
        <div class="si"><span class="sl">COUNT</span><span class="sv" id="s-cnt">—</span></div>
        <div class="si"><span class="sl">B</span><span class="sv" id="s-b" style="color:var(--b)">—</span></div>
        <div class="si"><span class="sl">BUCKETS</span><span class="sv" id="s-bk" style="color:var(--o)">—</span></div>
        <div class="si"><span class="sl">LOAD</span><span class="sv" id="s-lf" style="color:var(--c)">—</span></div>
        <div class="si"><span class="sl">GROW</span><span class="sv" id="s-gr">—</span></div>
      </div>
      <div id="ctrl">
        <button class="cb" onclick="prev()">◀ PREV</button>
        <button class="cb" id="pb" onclick="togglePlay()">▶ PLAY</button>
        <button class="cb" onclick="next()">NEXT ▶</button>
        <div class="csep"></div>
        <button class="cb" onclick="doReset()">↺</button>
        <div class="csep"></div>
        <span style="font-size:7.5px;color:var(--ad)">SPD</span>
        <input type="range" id="spd" min="1" max="10" value="4" oninput="setSpd(this.value)">
        <span id="sc">1/1</span>
      </div>
      <div id="kb">
        <span class="kh"><span class="kk">←→</span>step</span>
        <span class="kh"><span class="kk">SPC</span>play</span>
        <span class="kh"><span class="kk">R</span>reset</span>
        <span class="kh"><span class="kk">M</span>mute</span>
        <span class="kh"><span class="kk">1–6</span>scene</span>
      </div>
    </div>

    <!-- RIGHT -->
    <div id="right">

      <!-- CODE — ALWAYS VISIBLE, LARGE -->
      <div id="code-section">
        <div id="code-hdr">
          <span id="code-hdr-title">▸ SOURCE</span>
          <span id="code-hdr-file">runtime/map.go</span>
        </div>
        <div id="code-area"></div>
      </div>

      <!-- BOTTOM: explanation + tabs -->
      <div id="bottom-section">
        <div id="explain-bar">
          <div id="explain-inner">
            <div class="expl-row1">
              <span class="badge init" id="badge">INIT</span>
              <span id="expl-title">SELECT A SCENE</span>
              <span id="expl-step" style="margin-left:auto">—</span>
            </div>
            <div id="expl-body">Press 1–6 to select a scenario. Use ← → to step through.</div>
            <div id="expl-insight" style="display:none"></div>
          </div>
        </div>
        <div id="bot-tabs-bar">
          <div class="btab active" onclick="showBTab('usage')" id="bt-usage">▸ USAGE EXAMPLES</div>
          <div class="btab" onclick="showBTab('concepts')" id="bt-concepts">▸ KEY CONCEPTS</div>
          <div class="btab" onclick="showBTab('traps')" id="bt-traps">▸ GOTCHAS</div>
        </div>
        <div id="bot-panels">
          <div class="bpanel active" id="bp-usage"></div>
          <div class="bpanel" id="bp-concepts"></div>
          <div class="bpanel" id="bp-traps"></div>
        </div>
      </div>
    </div>

  </div>
</div></div>

<script>
/* ── NOISE ── */
(()=>{const c=document.getElementById('noise'),x=c.getContext('2d');
function r(){c.width=innerWidth;c.height=innerHeight;}r();window.addEventListener('resize',r);
function d(){const id=x.createImageData(c.width,c.height),da=id.data;
for(let i=0;i<da.length;i+=4){const v=Math.random()>.97?200:0;da[i]=da[i+1]=da[i+2]=v;da[i+3]=v?80:0;}
x.putImageData(id,0,0);requestAnimationFrame(d);}d();})();
function sGlitch(){setTimeout(()=>{const e=document.getElementById('crt');e.style.filter='brightness(.1)';setTimeout(()=>{e.style.filter='';sGlitch();},12+Math.random()*14);},6000+Math.random()*10000);}sGlitch();
function flashCA(d=240){const e=document.getElementById('ca');e.classList.add('on');setTimeout(()=>e.classList.remove('on'),d);}

/* ── AUDIO ── */
let AC=null,muted=false;
function snd(t){if(muted||!AC)return;try{
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  const f={hash:440,insert:570,lookup:510,grow:310,evac:390,crash:100,warn:220,done:630,init:360};
  o.frequency.setValueAtTime(f[t]||380,AC.currentTime);
  o.type=t==='crash'?'sawtooth':'triangle';
  g.gain.setValueAtTime(.052,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.16);
  o.start();o.stop(AC.currentTime+.18);
}catch(e){}}
function toggleMute(){muted=!muted;document.getElementById('snd').textContent=muted?'🔇':'🔊';if(!muted)snd('insert');}

/* ── BOTTOM TABS ── */
function showBTab(id){
  document.querySelectorAll('.bpanel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.btab').forEach(t=>t.classList.remove('active'));
  document.getElementById('bp-'+id).classList.add('active');
  document.getElementById('bt-'+id).classList.add('active');
}

/* ── SYNTAX HIGHLIGHT ── */
function hlLine(line){
  const ci=line.indexOf('//');
  const raw=ci>=0?line.slice(0,ci):line;
  const cmt=ci>=0?line.slice(ci):'';
  function p(s){
    s=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    s=s.replace(/"([^"]*)"/g,'<span class="str">"$1"</span>');
    s=s.replace(/`([^`]*)`/g,'<span class="str">`$1`</span>');
    s=s.replace(/\b(func|go|var|type|struct|const|return|if|else|for|range|defer|make|delete|true|false|nil|unsafe|interface|chan|select|case|default|goto|import|package)\b/g,'<span class="kw">$1</span>');
    s=s.replace(/\b([A-Z][a-zA-Z0-9_]*)\b/g,'<span class="fn">$1</span>');
    s=s.replace(/\b(\d[\d_]*)\b/g,'<span class="nm">$1</span>');
    s=s.replace(/(:=|==|!=|&amp;&amp;|\|\||&lt;&lt;|&gt;&gt;)/g,'<span class="op">$1</span>');
    return s;
  }
  return p(raw)+(cmt?`<span class="cm">${cmt.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`:'');
}
function renderCode(lines,active){
  const el=document.getElementById('code-area');
  el.innerHTML=lines.map((l,i)=>`<div class="cl${i===active?' act':''}"><span class="ln">${i+1}</span><span>${hlLine(l)}</span></div>`).join('');
  if(active>=0){const a=el.querySelectorAll('.cl')[active];if(a)setTimeout(()=>a.scrollIntoView({block:'nearest'}),50);}
}
function hlUsage(code){
  return code.split('\n').map(line=>{
    const ci=line.indexOf('//');
    const raw=ci>=0?line.slice(0,ci):line;
    const cmt=ci>=0?line.slice(ci):'';
    function p(s){
      s=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      s=s.replace(/"([^"]*)"/g,'<span class="str">"$1"</span>');
      s=s.replace(/`([^`]*)`/g,'<span class="str">`$1`</span>');
      s=s.replace(/\b(func|go|var|type|struct|const|return|if|else|for|range|defer|make|delete|true|false|nil|import|package|chan|select|case|default|interface)\b/g,'<span class="kw">$1</span>');
      s=s.replace(/\b([A-Z][a-zA-Z0-9_]*)\b/g,'<span class="fn">$1</span>');
      s=s.replace(/\b(\d[\d_]*)\b/g,'<span class="nm">$1</span>');
      return s;
    }
    return p(raw)+(cmt?`<span class="cm">${cmt.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`:'');
  }).join('\n');
}

const cv=document.getElementById('vc'),cx=cv.getContext('2d');
let W=0,H=0;
function resize(){const el=document.getElementById('viz');W=cv.width=el.clientWidth;H=cv.height=el.clientHeight;if(PLAY.steps.length)draw(PLAY.steps[PLAY.idx]);}
window.addEventListener('resize',resize);
const C={A:'#ffb229',G:'#4ade80',R:'#f43f5e',B:'#60a5fa',N:'#22d3ee',O:'#f97316',P:'#a855f7',D:'rgba(255,178,41,.14)'};
function box(x,y,w,h,stroke,fill,glow,lw){
  cx.save();if(glow){cx.shadowColor=stroke;cx.shadowBlur=16;}
  cx.lineWidth=lw||1.5;cx.strokeStyle=stroke;cx.fillStyle=fill||stroke+'14';
  cx.fillRect(x,y,w,h);cx.strokeRect(x,y,w,h);cx.restore();
}
function txt(s,x,y,font,col,align,base){
  cx.save();cx.font=font;cx.fillStyle=col;cx.textAlign=align||'center';cx.textBaseline=base||'middle';cx.fillText(s,x,y);cx.restore();
}
function glowtxt(s,x,y,font,col){
  cx.save();cx.font=font;cx.fillStyle=col;cx.shadowColor=col;cx.shadowBlur=18;cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s,x,y);cx.restore();
}
function arrow(x1,y1,x2,y2,col,label,dashed){
  cx.save();cx.strokeStyle=col;cx.lineWidth=1.5;cx.shadowColor=col;cx.shadowBlur=5;
  if(dashed)cx.setLineDash([4,3]);
  cx.beginPath();cx.moveTo(x1,y1);cx.lineTo(x2,y2);cx.stroke();cx.setLineDash([]);
  const a=Math.atan2(y2-y1,x2-x1);
  cx.fillStyle=col;cx.shadowBlur=0;
  cx.beginPath();cx.moveTo(x2,y2);cx.lineTo(x2-8*Math.cos(a-.32),y2-8*Math.sin(a-.32));cx.lineTo(x2-8*Math.cos(a+.32),y2-8*Math.sin(a+.32));cx.closePath();cx.fill();
  if(label){cx.font="9px 'Share Tech Mono'";cx.fillStyle=col;cx.textAlign='center';cx.textBaseline='bottom';cx.shadowBlur=0;cx.fillText(label,(x1+x2)/2,(y1+y2)/2-4);}
  cx.restore();
}
function ann(s,x,y,col){cx.save();cx.font="9px 'Share Tech Mono'";cx.fillStyle=col||'rgba(255,178,41,.45)';cx.textAlign='center';cx.textBaseline='top';cx.fillText(s,x,y);cx.restore();}
function scHdr(s){cx.save();cx.font="9px 'Share Tech Mono'";cx.fillStyle='rgba(255,178,41,.13)';cx.textAlign='center';cx.textBaseline='top';cx.fillText(s,W/2,4);cx.restore();}

function drawHmap(s){
  scHdr('VAR m map[K]V  ——  POINTER TO 56-BYTE HMAP ON HEAP');
  const fields=[
    {n:'count',      t:'int',            sz:'8B',  v:s.count||'0',    c:C.A},
    {n:'flags',      t:'uint8',          sz:'1B',  v:s.flags||'0x00', c:C.O},
    {n:'B',          t:'uint8',          sz:'1B',  v:s.B||'0',        c:C.B},
    {n:'noverflow',  t:'uint16',         sz:'2B',  v:s.noverfl||'0',  c:C.P},
    {n:'hash0',      t:'uint32',         sz:'4B',  v:s.hash0||'...',  c:C.N},
    {n:'buckets',    t:'unsafe.Pointer', sz:'8B',  v:s.bptr||'nil',   c:C.G},
    {n:'oldbuckets', t:'unsafe.Pointer', sz:'8B',  v:s.oldptr||'nil', c:s.growing?C.O:'rgba(255,178,41,.2)'},
    {n:'nevacuate',  t:'uintptr',        sz:'8B',  v:s.nevac||'0',    c:s.growing?C.P:'rgba(255,178,41,.2)'},
  ];
  const fh=Math.min(H*.09,(H*.82)/fields.length);
  const fw=W*.76,fx=W*.18,fy=H*.09;

  // struct label left
  txt('hmap{',fx-6,fy-10,"10px 'Share Tech Mono'",'rgba(255,178,41,.25)','right');
  // stack variable
  box(W*.02,fy+fh*2.5,W*.12,fh*2,C.A+'55','transparent');
  glowtxt('m',W*.02+W*.06,fy+fh*3.5,"14px 'VT323'",C.A+'66');
  ann('stack var\n(*hmap)',W*.02+W*.06,fy+fh*5.5+4,'rgba(255,178,41,.3)');
  if(s.B)arrow(W*.14,fy+fh*3.5,fx,fy+fh*2.5+fh,C.A+'44','ptr');

  fields.forEach((f,i)=>{
    const y=fy+i*fh;
    const hi=s.hi===f.n;
    const col=f.c;
    const isActive=typeof col==='string'&&!col.startsWith('rgba');
    box(fx,y,fw,fh,hi?col:isActive?col+'55':'rgba(255,178,41,.12)',hi?col+'16':isActive?col+'06':'transparent',hi);
    txt(f.n,fx+10,y+fh/2,"11px 'IBM Plex Mono'",hi?col:isActive?col+'cc':'rgba(255,178,41,.3)','left');
    txt(f.t,fx+fw*.46,y+fh/2,"9px 'Share Tech Mono'",hi?'rgba(255,178,41,.6)':'rgba(255,178,41,.18)','center');
    txt(f.sz,fx+fw*.68,y+fh/2,"9px 'Share Tech Mono'",hi?'rgba(255,178,41,.5)':'rgba(255,178,41,.15)','center');
    txt(f.v,fx+fw-8,y+fh/2,"13px 'VT323'",hi?col:isActive?col+'88':'rgba(255,178,41,.2)','right');
  });
  txt('}',fx-6,fy+fh*fields.length+6,"10px 'Share Tech Mono'",'rgba(255,178,41,.25)','right');

  if(s.B&&parseInt(s.B)>0){
    const nb=1<<parseInt(s.B),show=Math.min(nb,5);
    const bw=Math.min(40,(W*.76)/(show+1));
    const bx=fx+fw+12,by=fy+H*.27;
    ann('buckets  2^'+s.B+'='+nb,bx+show*(bw+2)/2,by-14,C.G+'77');
    for(let i=0;i<show;i++){
      box(bx+i*(bw+2),by,bw,26,C.G+'44',C.G+'08');
      txt(i,bx+i*(bw+2)+bw/2,by+13,"11px 'VT323'",C.G+'55');
    }
    if(nb>5)txt('…',bx+show*(bw+2)+4,by+13,"9px 'VT323'",C.G+'33','left');
    const fi=fields.findIndex(f=>f.n==='buckets');
    arrow(fx+fw,fy+fi*fh+fh/2,bx,by+13,C.G+'55','');
  }
  if(s.note)glowtxt(s.note,W*.5,H*.92,"11px 'VT323'",s.nc||C.A);
}

function drawBmap(s){
  scHdr('[8]tophash  [8]keys  [8]values  overflow*bmap');
  const N=8,SLOT=s.slot>=0?s.slot:-1;
  const colW=(W*.9)/N,sx=W*.05;

  const sec=[[W*.1,'tophash[8]','uint8×8',C.B],[W*.36,'keys[8]','K×8',C.G],[W*.36,'values[8]','V×8',C.O],[W*.08,'overflow','*bmap',C.P]];
  let px=sx;
  sec.forEach(([w,lbl,sub,col])=>{
    box(px,H*.07,w*W,H*.1,col,col+'0e');
    txt(lbl,px+w*W/2,H*.07+H*.05*.7,"9px 'Share Tech Mono'",col);
    txt(sub,px+w*W/2,H*.07+H*.1*.8,"8px 'Share Tech Mono'",col+'55');
    px+=w*W;
  });

  if(SLOT>=0){
    cx.save();cx.fillStyle='rgba(255,178,41,.02)';cx.fillRect(sx+SLOT*colW,H*.22,colW,H*.58);cx.restore();
    box(sx+SLOT*colW,H*.22,colW,H*.58,'rgba(255,178,41,.08)','transparent');
    ann('slot '+SLOT,sx+SLOT*colW+colW/2,H*.225,C.A+'88');
  }

  const rows=[
    {lbl:'tophash',y:H*.27,h:H*.13,vals:s.th||Array(N).fill('0x00'),col:C.B},
    {lbl:'key',    y:H*.44,h:H*.15,vals:s.ks||Array(N).fill('—'),   col:C.G},
    {lbl:'value',  y:H*.63,h:H*.13,vals:s.vs||Array(N).fill('—'),   col:C.O},
  ];
  rows.forEach(row=>{
    txt(row.lbl,sx-4,row.y+row.h/2,"9px 'Share Tech Mono'",row.col+'77','right');
    for(let i=0;i<N;i++){
      const act=i===SLOT,filled=row.vals[i]!=='—'&&row.vals[i]!=='0x00';
      const col=row.col;
      box(sx+i*colW+1,row.y,colW-3,row.h,act?col:filled?col+'55':col+'18',act?col+'16':filled?col+'09':'transparent',act);
      txt(row.vals[i],sx+i*colW+colW/2,row.y+row.h/2,"11px 'VT323'",act?col:filled?col+'bb':col+'28');
    }
  });

  const ovY=H*.83,ovC=s.ov&&s.ov!=='nil'?C.P:C.D;
  box(sx,ovY,W*.9,H*.075,ovC,ovC+'09');
  txt('overflow → '+(s.ov||'nil'),W*.5,ovY+H*.037,"11px 'Share Tech Mono'",ovC);
  if(s.note)ann(s.note,W*.5,H*.94,s.nc||C.B+'88');
}

function drawLookup(s){
  scHdr('mapaccess1: hash(key,seed) → bucket[low B bits] → tophash scan → key.equal');
  const B=parseInt(s.B||'3');
  const step=s.step||0;

  // pipeline steps
  const pipe=['1.hash(key,seed)','2.bucket=hash&mask','3.tophash=hash>>56','4.scan tophash[8]','5.key.equal()'];
  const sw=(W*.9)/pipe.length,sy=H*.07;
  pipe.forEach((st,i)=>{
    const done=step>i,cur=step===i;
    const col=cur?C.A:done?C.G+'88':'rgba(255,178,41,.18)';
    box(W*.05+i*sw,sy,sw-3,26,col,cur?col+'16':done?C.G+'07':'transparent',cur);
    txt(st,W*.05+i*sw+(sw-3)/2,sy+13,"8px 'Share Tech Mono'",col);
    if(i<pipe.length-1){
      const ax=W*.05+(i+1)*sw-3;
      cx.save();cx.fillStyle=done||cur?C.G+'55':'rgba(255,178,41,.12)';
      cx.beginPath();cx.moveTo(ax,sy+6);cx.lineTo(ax+4,sy+13);cx.lineTo(ax,sy+20);cx.fill();cx.restore();
    }
  });

  // hash bar
  if(step>=1){
    const bx=W*.05,by=H*.23,bw=W*.9,bh=H*.1;
    const tp=8/64,bp=B/64,mp=1-tp-bp;
    ann('64-bit hash = 0x'+(s.hashval||'8FC3'+(s.bucket!==undefined?s.bucket.toString(16).padStart(2,'0'):'02')+'1A'),W*.5,by-14,C.A+'55');
    box(bx,by,bw*tp,bh,C.B,C.B+'18',step===2||step===0);
    txt('top 8 bits',bx+bw*tp/2,by+bh*.35,"8px 'Share Tech Mono'",C.B);
    txt('0x'+(s.top||'8F'),bx+bw*tp/2,by+bh*.72,"14px 'VT323'",C.B);
    box(bx+bw*tp,by,bw*mp,bh,'rgba(255,178,41,.1)','transparent');
    txt('middle '+(64-B-8)+' bits',bx+bw*tp+bw*mp/2,by+bh/2,"8px 'Share Tech Mono'",'rgba(255,178,41,.18)');
    box(bx+bw*(tp+mp),by,bw*bp,bh,C.G,C.G+'18',step===1);
    txt('low '+B+' bits',bx+bw*(tp+mp)+bw*bp/2,by+bh*.35,"8px 'Share Tech Mono'",C.G);
    txt(s.bucket!==undefined?'→ bucket #'+s.bucket:'→ bucket',bx+bw*(tp+mp)+bw*bp/2,by+bh*.72,"12px 'VT323'",C.G);
  }

  // bucket array
  if(step>=2){
    const nb=1<<B,show=Math.min(nb,8);
    const bkw=Math.min(52,W*.86/show);
    const bkx=(W-show*bkw)/2,bky=H*.42;
    ann('bucket array [0..'+(nb-1)+']',W*.5,bky-13,C.G+'55');
    for(let i=0;i<show;i++){
      const sel=i===s.bucket;
      box(bkx+i*bkw,bky,bkw-2,34,sel?C.G:C.G+'28',sel?C.G+'14':'transparent',sel);
      txt(i,bkx+i*bkw+(bkw-2)/2,bky+17,"12px 'VT323'",sel?C.G:C.G+'28');
    }
    if(nb>8)txt('…',bkx+show*bkw+4,bky+17,"10px",C.G+'28','left');
    if(s.bucket!==undefined){
      const bx=W*.05,bw=W*.9,by=H*.23,bh=H*.1,tp=8/64,bp=B/64,mp=1-tp-bp;
      arrow(bx+bw*(tp+mp)+bw*bp/2,by+bh,bkx+s.bucket*bkw+(bkw-2)/2,bky,C.G+'66','');
    }
  }

  // tophash scan
  if(step>=3){
    const N=8,slw=W*.88/N,slx=W*.06,sly=H*.61;
    ann('scanning tophash[8] in bucket #'+(s.bucket||0)+' — target: 0x'+(s.top||'8F'),W*.5,sly-13,C.B+'66');
    const ths=s.tophash||['0x44','0x8F','0x12','0x8F','0x00','0x00','0x00','0x00'];
    ths.forEach((v,i)=>{
      const match=v==='0x'+(s.top||'8F')&&v!=='0x00';
      const scanning=i===(s.scanAt||0)&&step===3;
      const col=match?(step>=4?C.G:C.B):(scanning?C.A:C.B+'28');
      const act=match||scanning;
      box(slx+i*slw,sly,slw-2,36,col,act?col+'12':'transparent',act);
      txt(v,slx+i*slw+(slw-2)/2,sly+18,"11px 'VT323'",act?col:col);
      if(match&&step>=4)glowtxt('✓',slx+i*slw+(slw-2)/2,sly+44,"10px 'Share Tech Mono'",C.G);
      if(scanning)ann('checking',slx+i*slw+(slw-2)/2,sly+42,C.A+'66');
    });
  }
  if(s.result)glowtxt(s.result,W*.5,H*.87,"13px 'VT323'",s.rc||C.G);
}

function drawInsert(s){
  scHdr('mapassign: SET FLAG → SCAN BUCKET → WRITE/UPDATE → CHECK GROW');
  const flagSet=s.flagSet||s.crash;
  const fc=s.crash?C.R:flagSet?C.O:C.D;

  // write flag
  const fw=W*.7,fh=38,fx=(W-fw)/2,fy=H*.07;
  box(fx,fy,fw,fh,fc,fc+(s.crash?'14':flagSet?'08':'03'),flagSet||s.crash);
  txt('hmap.flags  hashWriting = '+(flagSet?'1':'0'),fx+fw/2,fy+14,"11px 'Share Tech Mono'",fc);
  txt(s.crash?'FATAL: concurrent map write — fatal(), not panic() — no recover()':(flagSet?'write in progress — concurrent write here → fatal()':'flag clear — safe to proceed'),fx+fw/2,fy+27,"9px 'Share Tech Mono'",fc+'99');

  // 8 slots
  const N=8,slh=42,slw=W*.9/N,slx=W*.05,sly=H*.3;
  ann('bucket #'+(s.bucket||0)+' — 8 slots',W*.5,sly-13,'rgba(255,178,41,.38)');
  const slots=s.slots||Array(N).fill('empty');
  slots.forEach((state,i)=>{
    const col=state==='empty'?'rgba(255,178,41,.16)':state==='target'?C.G:state==='match'||state==='update'?C.B:state==='full'?C.O+'66':C.A+'22';
    const act=state==='target'||state==='match'||state==='update';
    box(slx+i*slw+1,sly,slw-3,slh,col,act?col+'16':'transparent',act);
    const lbl=state==='empty'?'—':state==='target'?(s.key||'new'):state==='match'?'KEY✓':state==='update'?'UPDATE':state==='full'?'kv'+i:'?';
    txt(lbl,slx+i*slw+slw/2,sly+21,"11px 'VT323'",act?col:(typeof col==='string'&&col.startsWith('rgba')?col:'rgba(255,178,41,.25)'));
    const th=state==='empty'?'0x00':'0x'+( s.top||'??');
    ann(th,slx+i*slw+slw/2,sly+slh+4,col+(typeof col==='string'&&col.startsWith('#')?'55':''));
  });

  // load gauge
  const count=parseFloat(s.count||'0');
  const Bv=parseInt(s.B||'1');
  const bkts=Math.pow(2,Bv);
  const lf=count>0?(count/bkts).toFixed(2):'0.00';
  const gx=W*.06,gy=H*.59,gw=W*.88,gh=16;
  ann('LOAD: '+count+'/'+bkts+' = '+lf+'  [threshold 6.5]',W*.5,gy-13,'rgba(255,178,41,.45)');
  box(gx,gy,gw,gh,'rgba(255,178,41,.1)','transparent');
  const pct=Math.min(parseFloat(lf)/10,1);
  const gc=parseFloat(lf)>6.5?C.R:parseFloat(lf)>5?C.O:C.G;
  cx.save();cx.fillStyle=gc+'cc';cx.fillRect(gx,gy,gw*pct,gh);cx.restore();
  box(gx,gy,gw,gh,'rgba(255,178,41,.1)','transparent');
  const tx=gx+gw*(6.5/10);
  cx.save();cx.strokeStyle=C.R+'aa';cx.lineWidth=2;cx.setLineDash([4,3]);cx.beginPath();cx.moveTo(tx,gy-7);cx.lineTo(tx,gy+gh+7);cx.stroke();cx.setLineDash([]);cx.restore();
  txt('6.5',tx,gy-11,"9px 'Share Tech Mono'",C.R);

  if(s.overflow)glowtxt('OVERFLOW BUCKET ALLOCATED',W*.5,H*.78,"13px 'VT323'",C.P);
  if(s.growTrig)glowtxt('hashGrow()  B:'+Bv+'→'+(Bv+1)+'  double buckets',W*.5,H*.84,"13px 'VT323'",C.O);
  if(s.note&&!s.growTrig&&!s.overflow)ann(s.note,W*.5,H*.82,s.nc||C.A);
}

function drawGrow(s){
  scHdr('INCREMENTAL: each write evacuates 1–2 OLD buckets. no STW.');
  const B=parseInt(s.B||'3');
  const oldN=1<<(B-1),newN=1<<B;
  const evac=parseInt(s.nevac||'0');
  const mo=Math.min(oldN,7),mn=Math.min(newN,7);

  const oh=46,obw=(W*.46-8)/mo,ox=W*.03,oy=H*.18;
  ann('oldbuckets  [B='+(B-1)+']  '+oldN+' buckets',ox+W*.23,oy-15,C.O+'77');
  for(let i=0;i<mo;i++){
    const done=i<evac;
    const col=done?'rgba(255,178,41,.13)':C.O;
    box(ox+i*(obw+2),oy,obw,oh,col,done?'transparent':C.O+'11',!done);
    txt(i,ox+i*(obw+2)+obw/2,oy+oh*.42,"13px 'VT323'",done?'rgba(255,178,41,.2)':C.O);
    if(done){
      cx.save();cx.strokeStyle=C.O+'3a';cx.lineWidth=1.5;
      cx.beginPath();cx.moveTo(ox+i*(obw+2)+5,oy+oh*.5);cx.lineTo(ox+i*(obw+2)+obw*.38,oy+oh*.78);cx.lineTo(ox+i*(obw+2)+obw*.88,oy+oh*.18);cx.stroke();cx.restore();
    }
  }

  // progress bar
  const pw=W*.56,px=W*.22,py=H*.42;
  const pct=evac/Math.max(oldN,1);
  ann('nevacuate = '+evac+' / '+oldN+'  (evacuation progress)',W*.5,py-13,C.P+'88');
  box(px,py,pw,10,'rgba(168,85,247,.2)','transparent');
  cx.save();cx.fillStyle=C.P;cx.fillRect(px,py,pw*pct,10);cx.restore();
  box(px,py,pw,10,'rgba(168,85,247,.2)','transparent');

  ann('bit '+(B-1)+'=0 → X (same idx)',W*.26,py+18,C.G+'66');
  ann('bit '+(B-1)+'=1 → Y (idx+'+oldN+')',W*.74,py+18,C.B+'66');

  for(let i=0;i<Math.min(evac,mo);i++){
    const midX=ox+i*(obw+2)+obw/2;
    arrow(midX,oy+oh,midX-obw*.28,H*.55,C.G+'33','X',true);
    arrow(midX,oy+oh,midX+obw*.48,H*.55,C.B+'33','Y',true);
  }

  const nh=46,nbw=(W*.46-8)/mn,nx=W*.51,ny=H*.57;
  ann('buckets  [B='+B+']  '+newN+' buckets',nx+W*.23,ny-15,C.G+'77');
  for(let i=0;i<mn;i++){
    const isX=i<evac,isY=i>=oldN&&i<oldN+evac;
    const col=isX?C.G:isY?C.B:C.G+'1a';
    box(nx+i*(nbw+2),ny,nbw,nh,col,col+(isX||isY?'10':'03'),isX||isY);
    txt(i,nx+i*(nbw+2)+nbw/2,ny+nh*.42,"12px 'VT323'",(isX||isY)?col:C.G+'22');
    if(isX)ann('X',nx+i*(nbw+2)+nbw/2,ny+nh*.75,C.G+'77');
    if(isY)ann('Y',nx+i*(nbw+2)+nbw/2,ny+nh*.75,C.B+'77');
  }

  if(s.note)glowtxt(s.note,W*.5,H*.9,"12px 'VT323'",s.nc||C.G);
}

function drawConcurrent(s){
  scHdr('NOT GOROUTINE-SAFE — concurrent write = fatal(), not panic()');
  const gw=W*.27,gh=50,gy=H*.1;
  const g1x=W*.04,g2x=W*.69;
  const G1c=s.g1?C.B:C.B+'33',G2c=s.g2?C.O:C.O+'33';

  box(g1x,gy,gw,gh,G1c,C.B+(s.g1?'0c':'03'),s.g1);
  glowtxt('goroutine 1',g1x+gw/2,gy+18,"11px 'VT323'",G1c);
  txt(s.g1op||'_ = m["a"]',g1x+gw/2,gy+36,"9px 'Share Tech Mono'",G1c+'cc');

  box(g2x,gy,gw,gh,G2c,C.O+(s.g2?'0c':'03'),s.g2);
  glowtxt('goroutine 2',g2x+gw/2,gy+18,"11px 'VT323'",G2c);
  txt(s.g2op||'_ = m["b"]',g2x+gw/2,gy+36,"9px 'Share Tech Mono'",G2c+'cc');

  const mx=W*.34,my=H*.1,mw=W*.32,mh=50;
  const mc=s.crash?C.R:s.conflict?C.O:C.A+'33';

usage:[
  {n:1,title:'Two-value form — the correct way to check existence',sub:'v, ok := m[k] — always use when absence matters',code:`m := map[string]int{"active": 0, "count": 5}

// ONE-VALUE form: cannot distinguish missing from zero
v := m["active"]   // v = 0 — is it zero or missing? unclear!
v  = m["missing"]  // v = 0 — same as above!

// TWO-VALUE form: always explicit
v, ok := m["active"]   // v=0, ok=true  — key present, value is 0
v, ok  = m["missing"]  // v=0, ok=false — key absent
v, ok  = m["count"]    // v=5, ok=true  — key present

// Idiomatic pattern: guard with ok
if result, ok := m[key]; ok {
    process(result)
} else {
    handleMissing(key)
}`,note:'Always use the two-value form when you need to distinguish "key absent" from "key maps to zero value". Common bug: checking v == 0 instead of !ok.'},
  {n:2,title:'getOrDefault and zero-value tricks',sub:'zero value semantics make many patterns clean',code:`// Counting — zero value of int is 0, so ++ works
freq := make(map[string]int)
words := strings.Fields(text)
for _, w := range words {
    freq[w]++   // first time: 0+1=1; subsequent: prev+1
}

// Grouping — zero value of []T is nil, append works on nil
groups := make(map[string][]string)
for _, item := range items {
    groups[item.Category] = append(groups[item.Category], item.Name)
}

// Set — map[T]struct{} uses zero allocation for values

for _, s := range slice {
    seen[s] = struct{}{}
}
_, exists := seen["foo"]`,note:'map[K]struct{} is the canonical Go set. struct{} takes 0 bytes. Vs map[K]bool: identical lookup performance, slightly less memory.'},
  {n:3,title:'Reading during iteration — what is safe',sub:'delete during range is spec-guaranteed safe',code:`m := map[string]int{"a": 1, "b": 2, "c": 3, "d": 4}

// SAFE: delete the current key during range
for k, v := range m {
    if v < 2 {
        delete(m, k)  // safe per Go spec
    }
}

// SAFE: update existing key during range
for k := range m {
    m[k] *= 10   // OK — only modifies existing keys
}

// UNDEFINED: add NEW keys during range
// Go spec: "If a map entry is created during iteration,
//  that entry may or may not be produced during iteration."
for k := range m {
    m["new_"+k] = 0  // may or may not appear in this range
}`,note:''},
  {n:4,title:'Concurrent read-only: safe without locks',sub:'reads do not set hashWriting flag',code:`// Multiple goroutines reading the SAME map: SAFE
// (as long as NO goroutine writes concurrently)

var cache = map[string][]byte{...}  // built once, read-only

// Start N goroutines reading cache concurrently:
for i := 0; i < 100; i++ {
    go func() {
        data := cache["some-key"]  // safe: no writer
        _ = data
    }()
}

// Concurrent reads do NOT set hashWriting.
// hashWriting is only set by mapassign/mapdelete.

// BUT: if ANY goroutine writes, ALL reads need sync.

code:[
  '// m[key] = val  →  mapassign(t *maptype, h *hmap, key unsafe.Pointer)',
  '// Returns pointer to value slot; caller writes value through it.',
  'func mapassign(t *maptype, h *hmap, key unsafe.Pointer) unsafe.Pointer {',
  '    // 1. detect concurrent write',
  '    if h.flags&hashWriting != 0 {',
  '        fatal("concurrent map writes")  // NOT panic',
  '    }',
  '    h.flags ^= hashWriting              // set flag',
  '',
  '    hash := t.hasher(key, uintptr(h.hash0))',
  '    b    := (*bmap)(add(h.buckets, (hash&bucketMask(h.B))*bucketsize))',
  '    top  := tophash(hash)',
  '',
  '    var inserti *uint8',
  '    var insertk, val unsafe.Pointer',
  '',
  '    // 2. scan: simultaneously find existing key OR empty slot',
  '    for {',
  '        for i := uintptr(0); i < bucketCnt; i++ {',
  '            if b.tophash[i] != top {',
  '                if isEmpty(b.tophash[i]) && inserti == nil {',
  '                    inserti = &b.tophash[i] // save first empty slot',
  '                    insertk = keyptr(b, i)',
  '                    val     = valptr(b, i)',
  '                }',
  '                if b.tophash[i] == emptyRest { break }',
  '                continue',
  '            }',
  '            // 3. tophash match — check full key equality',
  '            k := keyptr(b, i)',
  '            if !t.key.equal(key, k) { continue }',
  '            // 4. EXISTING KEY → UPDATE path (in-place)',
  '            val = valptr(b, i)',
  '            goto done',
  '        }',
  '        ovf := b.overflow(t)',
  '        if ovf == nil { break }',
  '        b = ovf',
  '    }',
  '    // 5. not found — grow if needed, then use inserti',
  '    if overLoadFactor(h.count+1, h.B) ||',
  '       tooManyOverflowBuckets(h.noverflow, h.B) {',
  '        hashGrow(t, h)',
  '        goto again  // retry after grow',
  '    }',
  '    if inserti == nil {  // no empty slot found',
  '        inserti, insertk, val = newoverflow(t, h, b)',
  '    }',
  '    *inserti = top; *insertk = key; h.count++',
  'done:',
  '    h.flags &^= hashWriting // clear flag',
  '    return val',
  '}',
],

func rebuild[K comparable, V any](m map[K]V) map[K]V {

  {n:3,title:'Concurrent write protection with sync.Mutex',sub:'simplest correct pattern for any write workload',code:`type SafeCounter struct {
    mu   sync.Mutex
    data map[string]int
}

func NewSafeCounter() *SafeCounter {
    return &SafeCounter{data: make(map[string]int)}
}

// write: exclusive lock
func (c *SafeCounter) Inc(key string) {
    c.mu.Lock()
    c.data[key]++
    c.mu.Unlock()  // defer is fine too, slightly slower
}

// read: also needs lock (write could be in progress)
func (c *SafeCounter) Get(key string) int {
    c.mu.Lock()
    defer c.mu.Unlock()
    return c.data[key]
}

// snapshot: lock, copy, release
func (c *SafeCounter) Snapshot() map[string]int {
    c.mu.Lock()
    defer c.mu.Unlock()
    cp := make(map[string]int, len(c.data))
    for k, v := range c.data { cp[k] = v }
    return cp
}`,note:''},

file:'runtime/map.go — hashGrow + evacuate',
code:[
  '// hashGrow: called when load>6.5 or too many overflow chains',
  'func hashGrow(t *maptype, h *hmap) {',
  '    bigger := uint8(1)          // assume B++ (double buckets)',
  '    if !overLoadFactor(h.count+1, h.B) {',
  '        // same-B grow: compaction, no doubling',
  '        bigger = 0',
  '    }',
  '    oldbuckets := h.buckets',
  '    newbuckets  = newarray(t.bucket, 1<<(h.B+bigger))',
  '    h.oldbuckets = oldbuckets  // save old array (all data here)',
  '    h.buckets    = newbuckets  // new array (empty)',
  '    h.B         += bigger',
  '    h.nevacuate  = 0           // start evacuation from bucket 0',
  '    // Keys NOT moved yet. Incremental evacuation starts now.',
  '}',
  '',
  '// evacuate: called 1-2x per write/delete during grow',
  'func evacuate(t *maptype, h *hmap, oldbucket uintptr) {',
  '    b      := oldbuckets[oldbucket]',
  '    newbit := h.noldbuckets()   // = 1 << (B - 1)',
  '    for ; b != nil; b = b.overflow(t) {',
  '        for i := 0; i < bucketCnt; i++ {',
  '            hash  := t.hasher(bucketKey(b, i), h.hash0)',
  '            // New bit determines X or Y destination:',
  '            useY  := (hash & newbit) != 0  // bit (B-1)',
  '            dst   := &xy[useY]  // xy[0]=X, xy[1]=Y',
  '            dst.b.tophash[dst.i] = b.tophash[i]',
  '            *dst.k = *bucketKey(b, i)',
  '            *dst.v = *bucketVal(b, i)',
  '            dst.i++',
  '        }',
  '    }',
  '    h.nevacuate++',
  '    if h.nevacuate == newbit {',
  '        advanceEvacMark(h) // all done, free old array',
  '    }',
  '}',
  '',
  '// Load factor: count > 6.5 * 2^B',
  '// At B=3 (8 buckets): grows at count=53',
  '// At B=10 (1024 buckets): grows at count=6656',
],

for i := 0; i < 100_000; i++ { m[i] = i }

// count = 10_000, but many overflow chains are now mostly empty

// Next insert may trigger tooManyOverflowBuckets:

    mu    sync.RWMutex
    cache = make(map[string][]byte, 1000)
)

// WRITER:
func set(k string, v []byte) {
    mu.Lock()
    defer mu.Unlock()
    cache[k] = v  // may trigger grow inside the write lock!
    // grow = atomic pointer swaps + memory allocation
    // All readers are blocked for duration of Lock()
    // Grow duration: ~microseconds for typical maps
}

// TIP: pre-size cache to avoid grow under lock:
// cache = make(map[string][]byte, expectedMaxSize)
// No grow → no spike under write lock`,note:'Grow under a write lock blocks all readers for the duration. Pre-sizing avoids this entirely.'},
  {n:5,title:'Compaction grow vs doubling grow at scale',sub:'understanding which mode triggers and why',code:`// DOUBLING GROW (bigger=1):
//   Condition: count > 6.5 * 2^B
//   Effect: B++, 2x buckets allocated
//   Use case: map is genuinely getting fuller

// COMPACTION GROW (bigger=0):
//   Condition: noverflow >= max(1, 2^(B-4))
//              (i.e., many overflow chains)
//   Effect: B unchanged, keys redistributed
//   Use case: insert-heavy + delete-heavy maps
//             that accumulate empty overflow buckets

// Example that triggers compaction, NOT doubling:
m := make(map[int]int)
for i := 0; i < 1000; i++ { m[i] = i }   // B grows
for i := 0; i < 990; i++ { delete(m, i) } // noverflow stays high
m[9999] = 9999  // may trigger compaction grow (not B++)

// Key insight: two separate growth mechanisms for two
// different pathological cases.`,note:''},

usage:[
  {n:1,title:'Generic safe map wrapper (Go 1.18+)',sub:'type-safe wrapper using generics',code:`type Map[K comparable, V any] struct {
    mu sync.RWMutex
    m  map[K]V
}

func NewMap[K comparable, V any]() *Map[K, V] {
    return &Map[K, V]{m: make(map[K]V)}
}

func (m *Map[K,V]) Set(k K, v V) {
    m.mu.Lock()
    m.m[k] = v
    m.mu.Unlock()
}

func (m *Map[K,V]) Get(k K) (V, bool) {
    m.mu.RLock()
    defer m.mu.RUnlock()
    v, ok := m.m[k]
    return v, ok
}

func (m *Map[K,V]) Delete(k K) {
    m.mu.Lock()
    delete(m.m, k)
    m.mu.Unlock()
}

func (m *Map[K,V]) Len() int {
    m.mu.RLock()
    defer m.mu.RUnlock()
    return len(m.m)
}`,note:'Generics eliminate interface{} type assertions. Works for any comparable key type.'},
  {n:2,title:'sync.Map for a service registry (ideal use case)',sub:'stable keys + many readers = sync.Map wins',code:`// Good fit: routes/handlers registered once, read on every request
var routes sync.Map

// Registration (startup, rare):
func Register(path string, h http.HandlerFunc) {
    routes.Store(path, h)
}

// Dispatch (hot path, very frequent):
func Dispatch(w http.ResponseWriter, r *http.Request) {
    v, ok := routes.Load(r.URL.Path)  // lock-free after warmup!
    if !ok {
        http.NotFound(w, r)
        return
    }
    v.(http.HandlerFunc)(w, r)
}

// LoadOrStore: atomic get-or-create (no double-init)
actual, loaded := routes.LoadOrStore("/new", newHandler)
if loaded {
    fmt.Println("already registered:", actual)
}`,note:'After the first few requests, the read map is fully populated and Load() is lock-free. This is the pattern sync.Map was designed for.'},
  {n:3,title:'Channel-based serialization pattern',sub:'one goroutine owns the map — no locks needed',code:`type op struct {
    key    string
    val    int
    write  bool
    result chan<- int
}

func mapWorker(ops <-chan op) {
    m := make(map[string]int)
    for o := range ops {
        if o.write {
            m[o.key] = o.val
            o.result <- 0  // ack
        } else {
            o.result <- m[o.key]
        }
    }
}

ch := make(chan op, 128)  // buffered for throughput
go mapWorker(ch)

// Caller:
result := make(chan int, 1)
ch <- op{key: "hits", result: result}
v := <-result

// Advantage: natural backpressure, no lock contention.
// Disadvantage: higher per-op latency (~goroutine schedule).`,note:''},

const shards = 64

type ShardedMap struct {
    shards [shards]struct {
        sync.RWMutex
        m map[string]int
    }
}

func NewShardedMap() *ShardedMap {
    sm := &ShardedMap{}
    for i := range sm.shards {
        sm.shards[i].m = make(map[string]int)
    }
    return sm
}

func (s *ShardedMap) shard(k string) int {
    h := fnv.New32()
    h.Write([]byte(k))
    return int(h.Sum32()) % shards
}

func (s *ShardedMap) Set(k string, v int) {
    sh := &s.shards[s.shard(k)]
    sh.Lock()
    sh.m[k] = v
    sh.Unlock()
}`,note:'64 shards → 64x less contention. Useful for hot-path caches with many goroutines. Trade-off: no atomic len(), Range() requires locking all shards.'},

/* ── PLAYBACK ── */
let SCENE='hmap';
const PLAY={steps:[],idx:0,playing:false,timer:null,speed:950};

function applyStep(step){
  draw(step);
  // badge + phase
  const b=document.getElementById('badge');
  b.textContent=step.phase.toUpperCase();b.className='badge '+step.phase;
  // title
  document.getElementById('expl-title').textContent=step.title||step.phase.toUpperCase();
  // body
  document.getElementById('expl-body').textContent=step.body||step.desc||'';
  // insight
  const ins=document.getElementById('expl-insight');
  if(step.insight){ins.innerHTML=step.insight;ins.style.display='block';}
  else{ins.style.display='none';}
  // step counter
  const tot=PLAY.steps.length;
  document.getElementById('expl-step').textContent=(PLAY.idx+1)+' / '+tot;
  document.getElementById('pbar').style.width=(tot>1?(PLAY.idx/(tot-1)*100):0)+'%';
  document.getElementById('sc').textContent=(PLAY.idx+1)+'/'+tot;
  // stats
  document.getElementById('s-cnt').textContent=step.count||'—';
  document.getElementById('s-b').textContent=step.B||'—';
  const bv=parseInt(step.B||'0');
  document.getElementById('s-bk').textContent=bv>0?Math.pow(2,bv):'—';
  const lf=step.count&&step.B?(parseFloat(step.count)/Math.pow(2,bv)).toFixed(2):'—';
  const lfEl=document.getElementById('s-lf');lfEl.textContent=lf;
  lfEl.style.color=parseFloat(lf)>6.5?'var(--r)':parseFloat(lf)>5?'var(--o)':'var(--c)';
  document.getElementById('s-gr').textContent=step.growing?'YES':(step.nevac&&step.nevac!=='0'?'evac':( step.growTrig?'GROW!':'no'));
  document.getElementById('s-gr').style.color=step.growing||step.growTrig?'var(--o)':'rgba(255,178,41,.4)';
  renderCode(SCENES[SCENE].code,step.cl>=0?step.cl:-1);
  snd(step.phase);
}
function next(){if(PLAY.idx<PLAY.steps.length-1){PLAY.idx++;applyStep(PLAY.steps[PLAY.idx]);}}
function prev(){if(PLAY.idx>0){PLAY.idx--;applyStep(PLAY.steps[PLAY.idx]);}}
function togglePlay(){
  if(PLAY.playing){
    clearInterval(PLAY.timer);PLAY.playing=false;
    document.getElementById('pb').textContent='▶ PLAY';document.getElementById('pb').classList.remove('pl');
  }else{
    PLAY.playing=true;document.getElementById('pb').textContent='⏸ PAUSE';document.getElementById('pb').classList.add('pl');
    PLAY.timer=setInterval(()=>{
      if(PLAY.idx<PLAY.steps.length-1){next();}
      else{clearInterval(PLAY.timer);PLAY.playing=false;document.getElementById('pb').textContent='▶ PLAY';document.getElementById('pb').classList.remove('pl');}
    },PLAY.speed);
  }
}
function doReset(){if(PLAY.playing)togglePlay();PLAY.idx=0;if(PLAY.steps.length)applyStep(PLAY.steps[0]);}
function setSpd(v){PLAY.speed=Math.round(2500-v*230);if(PLAY.playing){clearInterval(PLAY.timer);PLAY.timer=setInterval(()=>{if(PLAY.idx<PLAY.steps.length-1)next();else{clearInterval(PLAY.timer);PLAY.playing=false;document.getElementById('pb').textContent='▶ PLAY';document.getElementById('pb').classList.remove('pl');}},PLAY.speed);}}

    <div class="trap ${t.t}">
      <div class="trap-icon">${t.icon}</div>
      <div class="trap-body"><strong>${t.title}</strong>${t.body}</div>
    </div>`).join('');
}

function selectScene(key){
  if(PLAY.playing)togglePlay();
  SCENE=key;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.key===key));
  const sc=SCENES[key];
  PLAY.steps=sc.steps;PLAY.idx=0;
  document.getElementById('code-hdr-file').textContent=sc.file||'runtime/map.go';
  renderUsage(sc);renderConcepts(sc);renderTraps(sc);
  renderCode(sc.code,-1);
  applyStep(sc.steps[0]);
}
function buildTabs(){
  const order=[['hmap','1·HMAP'],['bmap','2·BUCKET'],['lookup','3·LOOKUP'],['insert','4·INSERT'],['grow','5·GROW'],['concurrent','6·CONCURRENT']];
  document.getElementById('tabs').innerHTML=order.map(([k,l])=>`<button class="tab" data-key="${k}" onclick="selectScene('${k}')">${l}</button>`).join('');
}
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='ArrowRight'||e.key===']')next();
  else if(e.key==='ArrowLeft'||e.key==='[')prev();
  else if(e.key===' '){e.preventDefault();togglePlay();}
  else if(e.key==='r'||e.key==='R')doReset();
  else if(e.key==='m'||e.key==='M')toggleMute();
  else if(e.key==='1')selectScene('hmap');
  else if(e.key==='2')selectScene('bmap');
  else if(e.key==='3')selectScene('lookup');
  else if(e.key==='4')selectScene('insert');
  else if(e.key==='5')selectScene('grow');
  else if(e.key==='6')selectScene('concurrent');
});

/* ── BOOT ── */
(function boot(){
  const term=document.getElementById('blog'),fill=document.getElementById('bfill');
  const lines=[
    ['Allocating hmap header (56B on amd64)','OK'],
    ['Calling fastrand() — hash seed','0x5f3a1c2b'],
    ['Computing B from load factor 6.5','B=3 → 8 buckets'],
    ['Checking bmap tophash layout','emptyRest = 0'],
    ['Loading incremental evacuator','1–2 per write'],
    ['Verifying hashWriting detection','fatal≠panic'],
    ['MAP.VIZ READY',''],
  ];
  let i=0;
  function nxt(){
    if(i>=lines.length){setTimeout(start,350);return;}
    const[msg,ok]=lines[i];
    const d=document.createElement('div');d.className='bline';
    d.innerHTML=`<span>${msg}</span><span class="bok">${ok||(i===lines.length-1?'<span class="bcur"></span>':'')}</span>`;
    term.appendChild(d);setTimeout(()=>d.classList.add('v'),20);
    fill.style.width=((i+1)/lines.length*100)+'%';
    i++;setTimeout(nxt,i===lines.length?300:100);
  }
  setTimeout(nxt,200);
})();
function start(){
  document.getElementById('boot').style.display='none';
  document.getElementById('main').classList.add('show');
  buildTabs();
  try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  window.addEventListener('resize',resize);
  resize();
  setTimeout(()=>selectScene('hmap'),150);
}
</script>
