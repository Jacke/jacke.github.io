<script>
/* NOISE */
(()=>{const c=document.getElementById('noise'),x=c.getContext('2d');const r=()=>{c.width=innerWidth;c.height=innerHeight;};r();window.addEventListener('resize',r);const d=()=>{const id=x.createImageData(c.width,c.height),da=id.data;for(let i=0;i<da.length;i+=4){const v=Math.random()>.968?255:0;da[i]=da[i+1]=da[i+2]=v;da[i+3]=v?130:0;}x.putImageData(id,0,0);requestAnimationFrame(d);};d();})();
function sGlitch(){setTimeout(()=>{document.getElementById('crt-wrap').style.filter='brightness(.25)';setTimeout(()=>{document.getElementById('crt-wrap').style.filter='';sGlitch();},20+Math.random()*14);},4200+Math.random()*5200);}sGlitch();
let AC=null,muted=false;
function initAudio(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function snd(type){if(muted||!AC)return;try{const g=AC.createGain(),ws=AC.createWaveShaper();const cv=new Float32Array(256);for(let i=0;i<256;i++){const x=i*2/256-1;cv[i]=x*(Math.PI+11)/(Math.PI+11*Math.abs(x));}ws.curve=cv;ws.connect(AC.destination);g.connect(ws);const o=AC.createOscillator();o.connect(g);const p={stack:[380,.06],heap:[480,.07],escape:[300,.1],gc:[560,.1],grow:[440,.08],alloc:[420,.06],free:[200,.08],move:[350,.07],click:[360,.04]};const[f,d]=p[type]||[360,.05];o.frequency.setValueAtTime(f,AC.currentTime);o.type='sawtooth';g.gain.setValueAtTime(.1,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.start(AC.currentTime);o.stop(AC.currentTime+d+.02);}catch(e){}}
function toggleMute(){muted=!muted;document.getElementById('snd-btn').textContent=muted?'🔇':'🔊';if(!muted)snd('click');}
function triggerCA(){const el=document.getElementById('ca-overlay');el.classList.remove('fire');void el.offsetWidth;el.classList.add('fire');}

function hlGo(l){let s=l.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');s=s.replace(/(\/\/.*)/g,'<span class="cm">$1</span>');s=s.replace(/"([^"]*)"/g,'<span class="str">"$1"</span>');s=s.replace(/\b(func|go|var|type|struct|return|if|for|make|new|nil|int|string|bool|interface|append|len|cap|unsafe|Sizeof|Pointer|uintptr)\b/g,'<span class="kw">$1</span>');s=s.replace(/\b([A-Z][a-zA-Z0-9]*)\b/g,'<span class="fn">$1</span>');s=s.replace(/\b(\d+)\b/g,'<span class="nm">$1</span>');return s;}
function renderCode(lines,active){const el=document.getElementById('code-scroll');el.innerHTML=lines.map((l,i)=>`<div class="cline${i===active?' active':''}"><span class="ln">${i+1}</span><span class="cc">${hlGo(l)}</span></div>`).join('');if(active>=0){const a=el.querySelectorAll('.cline')[active];if(a)a.scrollIntoView({block:'nearest'});}}

/* ══════ SCENARIOS ══════ */
const SCENARIOS={
  escape:{label:'ESCAPE ANALYSIS',
    code:['// Escape analysis: compiler decides stack vs heap','','func noEscape() *int {','    x := 42           // x escapes to heap','    return &x         // address returned → escapes','}','','func stackOnly() int {','    x := 42           // x stays on stack','    return x          // value returned → no escape','}','','func sliceEscape() {','    s := make([]int, 1000)  // large: heap','    _ = s','}','','func interfaceEscape(v interface{}) {','    // v stored in interface → heap (box alloc)','    store(v)  // unknown consumer → must escape','    // go build -gcflags="-m" shows escape decisions','}'],
    cx:`<strong>Escape</strong>: variable allocated on heap instead of stack<br><strong>Causes</strong>: return pointer, store in interface, closure capture, too large for stack, go routine<br><strong>Cost</strong>: heap alloc = GC pressure; stack alloc = free on return<br><strong>Tool</strong>: <code>go build -gcflags="-m"</code>`,
    how:`Go's compiler runs escape analysis on every variable. If a variable's address is taken and outlives its stack frame — it escapes to the heap.<br><br>Stack allocation is nearly free: just decrement SP. Heap allocation triggers GC eventually. Variables under 32KB typically stay on stack when possible.<br><br>Common escape triggers: returning a pointer, storing in <code>interface{}</code>, large arrays, goroutine captures.`,
    facts:`<span class="rw-tag">-gcflags="-m"</span> show escape analysis output per variable<br><span class="rw-tag">interface{}</span> boxing always allocates unless inlined by compiler<br><span class="rw-tag">fmt.Println</span> causes escapes — avoid in hot paths<br><span class="rw-tag">sync.Pool</span> reduces heap pressure for frequently allocated objects<br><span class="rw-tag">Benchmark</span> use -benchmem to count allocations per op`,
  },
  stackgrow:{label:'STACK GROWTH',
    code:['// Goroutine stack: starts small, grows as needed','','// Initial stack: 2KB (Go 1.4+)','// Max stack: 1GB (default, GOGC configurable)','','func recursive(n int) int {','    // each call frame: ~48 bytes','    if n == 0 { return 0 }','    return recursive(n - 1) + n  // stack grows','    // at overflow: runtime copies entire stack','    // old stack → new stack (2x size)','    // all pointers updated (Go uses pointer maps)','    // old stack freed','}','','// Stack segments (old pre-Go1.4):','// - hot split problem: flip-flop between segments','// Contiguous stacks (Go 1.4+):','// - copy-on-grow: no hot split, pointer rewrite','},'],
    cx:`<strong>Initial</strong>: 2KB per goroutine (Go 1.14+)<br><strong>Growth</strong>: double on overflow — copy entire stack<br><strong>Shrink</strong>: GC can shrink idle goroutine stacks<br><strong>Max</strong>: 1GB default (runtime.GOMAXSTACKS)`,
    how:`Goroutine stacks start at 2KB and grow dynamically. When the stack is too small, the runtime:<br>1. Allocates a new stack 2x the size<br>2. Copies all frames to the new location<br>3. Rewrites all pointers (using stack pointer maps)<br>4. Frees the old stack<br><br>This is why Go can run millions of goroutines — each starts tiny vs OS threads (8MB default).`,
    facts:`<span class="rw-tag">OS thread</span> stack: 8MB fixed — limits thread count<br><span class="rw-tag">Goroutine</span> stack: 2KB start → millions concurrent<br><span class="rw-tag">Stack scan</span> GC must scan all goroutine stacks for pointers<br><span class="rw-tag">goroutine leak</span> blocked goroutine = stack never freed<br><span class="rw-tag">Nosplit</span> runtime functions marked nosplit can't grow stack`,
  },
  gc:{label:'TRI-COLOR GC',
    code:['// Tri-color mark-and-sweep GC','// Three sets: White (unmarked), Grey (frontier), Black (done)','','// Phase 1: MARK START (STW ~100µs)','// - enable write barrier','// - scan all goroutine stacks (root set)','// - mark root objects grey','','// Phase 2: CONCURRENT MARK (concurrent)','// - goroutines run alongside GC workers','// - Grey → scan children → Black','// - Write barrier: if mutator writes, re-grey','','// Phase 3: MARK TERMINATION (STW ~100µs)','// - flush write barrier buffers','// - ensure all grey objects processed','','// Phase 4: SWEEP (concurrent)','// - reclaim white (unreachable) objects','// - no STW; lazy sweep during allocation','','// GOGC=100: GC when heap doubles (default)'],
    cx:`<strong>STW pauses</strong>: 2 per cycle, typically under 500µs<br><strong>Throughput</strong>: ~25% CPU for GC at GOGC=100<br><strong>Write barrier</strong>: Dijkstra-style — tri-color invariant maintenance<br><strong>GOGC=off</strong>: disable GC (use in tests/batch only)`,
    how:`Go uses a concurrent tri-color mark-and-sweep GC:<br><br><strong>White</strong>: not yet seen — candidate for collection<br><strong>Grey</strong>: seen but children not scanned yet<br><strong>Black</strong>: seen and all children processed — safe<br><br>The write barrier ensures: no black object directly points to white (tri-color invariant). Mutator goroutines run concurrently with GC workers.`,
    facts:`<span class="rw-tag">GOGC=100</span> trigger: heap doubles since last GC<br><span class="rw-tag">GOMEMLIMIT</span> Go 1.19+ soft memory limit for GC<br><span class="rw-tag">runtime.GC()</span> force immediate collection<br><span class="rw-tag">pprof heap</span> profile heap allocations with runtime/pprof<br><span class="rw-tag">Finalizers</span> runtime.SetFinalizer — avoid in prod (nondeterministic)`,
  },
  layout:{label:'STRUCT LAYOUT',
    code:['// Struct alignment: fields padded to alignment','','type Bad struct {','    a bool    // 1 byte + 7 pad','    b float64 // 8 bytes  → total: 16','    c bool    // 1 byte + 7 pad → total: 24','    // size: 24 bytes','    // waste: 14 bytes padding!','    // unsafe.Sizeof(Bad{}) == 24','    // fields not sorted by alignment','    // cost: larger structs = more GC scan work','    // cost: more cache line splits','    // cost: false sharing in concurrent maps','    // cost: larger slices = more memory','','}','','type Good struct {','    b float64 // 8 bytes','    a bool    // 1 byte','    c bool    // 1 byte + 6 pad','    // unsafe.Sizeof(Good{}) == 16 (saves 8B!)','    // rule: largest fields first','    // tool: fieldalignment linter','}'],
    cx:`<strong>Alignment rule</strong>: field at offset divisible by its size<br><strong>bool</strong>: 1-byte align. <strong>int32</strong>: 4-byte. <strong>float64</strong>: 8-byte<br><strong>Struct size</strong>: padded to largest field alignment<br><strong>Savings</strong>: reorder fields → up to 33% smaller struct`,
    how:`CPU requires fields to be naturally aligned: a float64 must be at an 8-byte-aligned offset. The Go compiler inserts <em>padding</em> between fields if needed.<br><br><strong>Fix</strong>: sort fields from largest to smallest alignment. This eliminates inter-field padding.<br><br><code>unsafe.Sizeof()</code> shows true struct size. <code>go vet -fieldalignment</code> lints bad layouts.`,
    facts:`<span class="rw-tag">fieldalignment</span> tool: golang.org/x/tools/go/analysis/passes/fieldalignment<br><span class="rw-tag">False sharing</span> two goroutines writing adjacent fields → same cache line → contention<br><span class="rw-tag">cache line</span> 64 bytes — pad hot fields to 64B to prevent sharing<br><span class="rw-tag">atomic</span> 64-bit atomics require 8-byte alignment (checked at startup)`,
  },
  pointers:{label:'POINTER INTERNALS',
    code:['// Go pointers: safe, GC-traced, no pointer arithmetic','','// Fat pointer (slice):','type SliceHeader struct {','    Data uintptr  // pointer to backing array','    Len  int      // current length','    Cap  int      // capacity','    // 24 bytes total on 64-bit','}','','// Fat pointer (string):','type StringHeader struct {','    Data uintptr','    Len  int      // 16 bytes total','    // string is immutable → no Cap field','}','','// Interface: two-word struct','type Iface struct {','    Type *itab   // pointer to type info + methods','    Data unsafe.Pointer // pointer to value (or value itself)','    // small values (≤ ptr size) stored directly','    // larger values: heap-allocated, Data points there','    // nil interface: both words = nil','    // typed nil: Type != nil, Data = nil','}'],
    cx:`<strong>Slice</strong>: 24 bytes (ptr + len + cap)<br><strong>String</strong>: 16 bytes (ptr + len) — immutable<br><strong>Interface</strong>: 16 bytes (type ptr + data ptr)<br><strong>Map/Chan</strong>: single pointer (8 bytes) to runtime struct`,
    how:`Understanding Go's fat pointers is critical for performance:<br><br><strong>Slices</strong>: passing a slice copies 24 bytes, not the backing array. Slice tricks are O(1) because they just adjust header fields.<br><br><strong>Interfaces</strong>: boxing a small value into <code>interface{}</code> may heap-allocate. The type word enables dynamic dispatch.<br><br><strong>nil</strong>: a typed nil interface has non-nil Type word — equality check <code>err == nil</code> checks both words.`,
    facts:`<span class="rw-tag">typed nil</span> (*T)(nil) != nil as error — classic Go bug<br><span class="rw-tag">interface boxing</span> always allocates if value > pointer size<br><span class="rw-tag">reflect.SliceHeader</span> deprecated in 1.20 — use unsafe.Slice instead<br><span class="rw-tag">uintptr</span> NOT traced by GC — never store live pointers as uintptr<br><span class="rw-tag">unsafe.Pointer</span> GC-safe pointer conversion — 6 valid patterns only`,
  },
};

    snap('alloc','Interface: 2 words (16B). Type=*itab (method table), Data=ptr to value or value itself.',9,{ptrs:[{type:'SLICE',words:[{label:'Data',val:'→',w:8,color:'#60a5fa'},{label:'Len',val:'5',w:8,color:'#4ade80'},{label:'Cap',val:'8',w:8,color:'#a855f7'}],note:'24B'},{type:'STRING',words:[{label:'Data',val:'→',w:8,color:'#fbbf24'},{label:'Len',val:'11',w:8,color:'#4ade80'}],note:'16B'},{type:'INTERFACE',words:[{label:'Type',val:'*itab',w:8,color:'#a855f7'},{label:'Data',val:'→ val',w:8,color:'#f97316'}],note:'nil interface: BOTH words = 0. typed nil: Type≠0, Data=0',hl:true}],heapObjs:[{id:'arr',label:'[8]int',size:64,color:'#60a5fa'},{id:'str',label:'"hello world"',size:11,color:'#fbbf24'},{id:'iface',label:'boxed val',size:8,color:'#f97316'}],gcRuns:0,escaped:3,heapBytes:83,stackBytes:56,goroutines:1});

/* ══════ CANVAS ══════ */
const canvas=document.getElementById('viz-canvas');
const ctx=canvas.getContext('2d');
let CW=0,CH=0;
function resizeCanvas(){const w=document.getElementById('viz-wrap');CW=canvas.width=w.clientWidth;CH=canvas.height=w.clientHeight;if(ST.steps.length)renderFrame(ST.steps[ST.idx]);}

function renderFrame(step){
  ctx.clearRect(0,0,CW,CH);
  if(!step)return;
  switch(curScene){
    case'escape':renderEscape(step);break;
    case'stackgrow':renderStack(step);break;
    case'gc':renderGC(step);break;
    case'layout':renderLayout(step);break;
    case'pointers':renderPointers(step);break;
  }
}

/* ─── ESCAPE RENDER ─── */
function renderEscape(step){
  const{heapObjs,stackFrames,gcRuns}=step;
  const PAD=14;
  ctx.font=`11px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,178,41,.3)';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(`ESCAPE ANALYSIS  heap_live=${step.heapBytes}B  gc_runs=${gcRuns}  escaped=${step.escaped}`,PAD,4);

  // STACK column
  const sX=PAD,sY=28,sW=CW*0.45-20,frameH=54;
  ctx.font=`12px 'VT323'`;ctx.fillStyle='rgba(96,165,250,.5)';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('STACK',sX,sY);
  (stackFrames||[]).forEach((f,i)=>{
    const fy=sY+18+i*frameH;
    ctx.save();ctx.strokeStyle='rgba(96,165,250,.3)';ctx.lineWidth=1;ctx.strokeRect(sX,fy,sW,frameH-4);
    ctx.font=`11px 'VT323'`;ctx.fillStyle='rgba(96,165,250,.6)';ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(f.name+'()',sX+4,fy+2);
    (f.vars||[]).forEach((v,j)=>{
      const col=v.escaped?'#f97316':v.freed?'#f43f5e':v.hl?'#fbbf24':'rgba(96,165,250,.5)';
      ctx.font=`10px 'IBM Plex Mono'`;ctx.fillStyle=col;ctx.textBaseline='top';
      ctx.fillText(`  ${v.name} = ${v.val}${v.escaped?' ↗ heap':''}${v.freed?' (freed)':''}`,sX+4,fy+16+j*14);
    });
    ctx.restore();
  });

  // HEAP column
  const hX=CW*0.5,hY=28,hW=CW*0.48;
  ctx.font=`12px 'VT323'`;ctx.fillStyle='rgba(74,222,128,.5)';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('HEAP',hX,hY);
  const gridCols=3,cellW=hW/gridCols-6;
  (heapObjs||[]).forEach((o,i)=>{
    const col=o.hl?o.color:o.color||'#4ade80';
    const ox=hX+(i%gridCols)*(cellW+6),oy=hY+18+Math.floor(i/gridCols)*60;
    const oh=Math.max(36,Math.min(54,o.size/200*36+20));
    ctx.save();if(o.hl){ctx.shadowColor=col;ctx.shadowBlur=12;}
    ctx.fillStyle=col+'18';ctx.strokeStyle=col+'88';ctx.lineWidth=1.2;
    ctx.fillRect(ox,oy,cellW,oh);ctx.strokeRect(ox,oy,cellW,oh);
    ctx.font=`11px 'VT323'`;ctx.fillStyle=col;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(o.label,ox+cellW/2,oy+oh/2-6);
    ctx.font=`9px 'Share Tech Mono'`;ctx.fillStyle=col+'88';
    ctx.fillText(`${o.size}B`,ox+cellW/2,oy+oh/2+8);
    ctx.restore();
  });
  if(!heapObjs||heapObjs.length===0){
    ctx.font=`12px 'Share Tech Mono'`;ctx.fillStyle='rgba(74,222,128,.1)';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('(empty — all on stack)',hX+hW/2,CH/2);
  }
}

/* ─── STACK GROW RENDER ─── */
function renderStack(step){
  const{stacks}=step;if(!stacks)return;
  const PAD=14;
  ctx.font=`11px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,178,41,.3)';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(`STACK GROWTH  goroutines=${step.goroutines}  stack_used=${step.stackBytes}B`,PAD,4);

  const gapX=24,stackW=Math.min(160,(CW-PAD*2-(stacks.length-1)*gapX)/stacks.length);
  stacks.forEach((g,gi)=>{
    const sx=PAD+gi*(stackW+gapX);
    const maxFrameH=Math.min(40,(CH-80)/Math.max(1,(g.frames||[]).length+1));
    const totalH=(g.frames.length+1)*maxFrameH;
    const baseY=Math.min(CH-40,80+totalH);

    // capacity bar bg
    const capH=Math.min(CH-80,g.cap/32);
    ctx.save();ctx.strokeStyle=g.color+'44';ctx.lineWidth=1;ctx.strokeRect(sx,baseY-capH,stackW,capH);ctx.restore();

    // label
    ctx.font=`14px 'VT323'`;ctx.fillStyle=g.color;ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(`${g.label} ${g.growing?'↑ GROW':''}${g.copied?'✓ COPIED':''}`,sx,28);
    ctx.font=`9px 'Share Tech Mono'`;ctx.fillStyle=g.color+'88';
    ctx.fillText(`${g.size/1024}KB / ${g.cap/1024}KB`,sx,44);

    // frames
    (g.frames||[]).forEach((f,fi)=>{
      const fy=baseY-(fi+1)*maxFrameH;
      const col=f.hl?'#fbbf24':g.color;
      ctx.save();if(f.hl||g.growing){ctx.shadowColor=col;ctx.shadowBlur=8;}
      ctx.fillStyle=col+'18';ctx.strokeStyle=col+(f.hl?'':g.copied?'88':'44');ctx.lineWidth=f.hl?1.5:1;
      ctx.fillRect(sx,fy,stackW,maxFrameH-2);ctx.strokeRect(sx,fy,stackW,maxFrameH-2);
      ctx.font=`10px 'IBM Plex Mono'`;ctx.fillStyle=col;ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText(`${f.name} (${f.sz}B)`,sx+4,fy+maxFrameH/2);
      ctx.restore();
    });

    // SP indicator
    const spY=baseY-(g.frames.length)*maxFrameH;
    ctx.save();ctx.strokeStyle=g.color+'80';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(sx,spY);ctx.lineTo(sx+stackW,spY);ctx.stroke();ctx.setLineDash([]);
    ctx.font=`9px 'Share Tech Mono'`;ctx.fillStyle=g.color+'60';ctx.textAlign='right';ctx.textBaseline='bottom';
    ctx.fillText('SP',sx+stackW-2,spY-1);ctx.restore();
  });

  // legend
  ctx.font=`10px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,178,41,.25)';ctx.textAlign='right';ctx.textBaseline='bottom';
  ctx.fillText('goroutine 2KB start  vs  OS thread 8MB fixed',CW-PAD,CH-6);
}

/* ─── GC RENDER ─── */
function renderGC(step){
  const{heapObjs,gcPhase,stw,writeBarrier,edges}=step;
  const PAD=14;
  ctx.font=`11px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,178,41,.3)';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(`TRI-COLOR GC  phase=${gcPhase||'idle'}  heap=${step.heapBytes}B  gc_runs=${step.gcRuns}  STW=${stw?'YES':'no'}  WB=${writeBarrier?'ON':'off'}`,PAD,4);

  // STW banner
  if(stw){
    ctx.save();ctx.fillStyle='rgba(244,63,94,.08)';ctx.fillRect(0,0,CW,CH);
    ctx.font=`18px 'VT323'`;ctx.fillStyle='rgba(244,63,94,.5)';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('STOP THE WORLD',CW/2,22);ctx.restore();
  }

  if(!heapObjs||heapObjs.length===0)return;
  const cols=Math.ceil(Math.sqrt(heapObjs.length+1));const rows=Math.ceil(heapObjs.length/cols);
  const cellW=(CW-PAD*2)/cols,cellH=Math.min(80,(CH-60)/rows);
  const startY=56;

  // draw edges first
  const posMap={};heapObjs.forEach((o,i)=>{posMap[o.id]={x:PAD+(i%cols)*cellW+cellW/2,y:startY+Math.floor(i/cols)*cellH+cellH/2};});
  (edges||[]).forEach(([a,b])=>{
    const p=posMap[a],q=posMap[b];if(!p||!q)return;
    ctx.save();ctx.strokeStyle='rgba(255,178,41,.2)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();ctx.setLineDash([]);ctx.restore();
  });

  // draw nodes
  heapObjs.forEach((o,i)=>{
    const ox=PAD+(i%cols)*cellW,oy=startY+Math.floor(i/cols)*cellH;
    const col=o.state==='grey'?'#fbbf24':o.state==='black'?'#60a5fa':o.state==='white'?'rgba(200,200,220,0.7)':'#4ade80';
    const borderCol=o.border||col;
    ctx.save();if(o.state==='grey'){ctx.shadowColor='#fbbf24';ctx.shadowBlur=12;}
    ctx.fillStyle=o.state==='black'?'rgba(26,26,46,0.9)':col+'18';
    ctx.strokeStyle=borderCol;ctx.lineWidth=o.state==='grey'?2:1;
    const r=Math.min(cellW,cellH)*0.38;const cx2=ox+cellW/2,cy2=oy+cellH/2;
    ctx.beginPath();ctx.arc(cx2,cy2,r,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.font=`16px 'VT323'`;ctx.fillStyle=o.state==='black'?'#60a5fa':col;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(o.id,cx2,cy2-4);
    ctx.font=`9px 'Share Tech Mono'`;ctx.fillStyle=(o.state==='black'?'#60a5fa':col)+'88';
    ctx.fillText(o.state.toUpperCase(),cx2,cy2+10);
    ctx.restore();
    // mark root
    if((step.roots||[]).includes(o.id)){ctx.save();ctx.strokeStyle='rgba(255,178,41,.4)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx2,cy2,r+6,0,Math.PI*2);ctx.stroke();ctx.restore();}
  });

  // legend
  const lX=CW-PAD-180,lY=CH-52;
  [['#aaa','WHITE = unvisited'],['#fbbf24','GREY = frontier'],['#60a5fa','BLACK = done'],['rgba(200,200,200,.3)','free']].forEach(([c,t],i)=>{
    ctx.fillStyle=c;ctx.fillRect(lX,lY+i*12,10,10);
    ctx.font=`9px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,178,41,.4)';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(t,lX+14,lY+i*12);
  });
}

/* ─── LAYOUT RENDER ─── */
function renderLayout(step){
  const{structs}=step;if(!structs)return;
  const PAD=14;
  ctx.font=`11px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,178,41,.3)';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('STRUCT MEMORY LAYOUT  |  natural alignment rules',PAD,4);
  const structH=(CH-50)/2-10;
  structs.forEach((s,si)=>{
    const sy=28+si*(structH+10);
    const col=s.winner?'#4ade80':'rgba(255,178,41,.5)';
    ctx.save();if(s.winner){ctx.shadowColor='#4ade80';ctx.shadowBlur=10;}
    ctx.font=`14px 'VT323'`;ctx.fillStyle=col;ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(`${s.name}  — ${s.total}B  (waste: ${s.waste}B)`,PAD,sy);ctx.restore();

    const scale=8;let ox=PAD;const oy=sy+20;const bh=24;
    s.fields.forEach(f=>{
      const fw=f.size*scale;
      ctx.save();if(f.hl){ctx.shadowColor=f.color;ctx.shadowBlur=8;}
      ctx.fillStyle=f.color+'25';ctx.strokeStyle=f.color;ctx.lineWidth=f.hl?1.8:1;
      ctx.fillRect(ox,oy,fw,bh);ctx.strokeRect(ox,oy,fw,bh);
      ctx.font=`9px 'IBM Plex Mono'`;ctx.fillStyle=f.color;ctx.textAlign='center';ctx.textBaseline='middle';
      if(fw>20)ctx.fillText(f.name,ox+fw/2,oy+bh/2);
      ctx.restore();ox+=fw;
      if(s.showPad&&f.pad>0){
        const pw=f.pad*scale;
        ctx.save();ctx.fillStyle='rgba(244,63,94,.1)';ctx.strokeStyle='rgba(244,63,94,.3)';ctx.lineWidth=1;ctx.setLineDash([2,2]);
        ctx.fillRect(ox,oy,pw,bh);ctx.strokeRect(ox,oy,pw,bh);
        ctx.font=`8px 'Share Tech Mono'`;ctx.fillStyle='rgba(244,63,94,.5)';ctx.textAlign='center';ctx.textBaseline='middle';
        if(pw>14)ctx.fillText(`+${f.pad}`,ox+pw/2,oy+bh/2);
        ctx.restore();ox+=pw;
      }
    });
    // byte ruler
    const totalPx=s.total*scale;
    ctx.save();ctx.strokeStyle='rgba(255,178,41,.2)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(PAD,oy+bh+3);ctx.lineTo(PAD+totalPx,oy+bh+3);ctx.stroke();
    ctx.font=`9px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,178,41,.3)';ctx.textAlign='right';ctx.textBaseline='top';ctx.fillText(`${s.total}B`,PAD+totalPx,oy+bh+4);ctx.restore();
  });
}

/* ─── POINTERS RENDER ─── */
function renderPointers(step){
  const{ptrs,heapObjs}=step;
  const PAD=14;
  ctx.font=`11px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,178,41,.3)';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('GO FAT POINTERS  |  slice / string / interface internals',PAD,4);
  const wordW=72,wordH=36,ptrGap=14;
  (ptrs||[]).forEach((ptr,pi)=>{
    const py=28+pi*(wordH+ptrGap+22);
    ctx.save();if(ptr.hl){ctx.shadowColor='rgba(255,178,41,.3)';ctx.shadowBlur=8;}
    ctx.font=`12px 'VT323'`;ctx.fillStyle=ptr.hl?'var(--amber)':'rgba(255,178,41,.5)';ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(ptr.type,PAD,py);ctx.restore();
    ptr.words.forEach((w,wi)=>{
      const wx=PAD+wi*(wordW+4),wy=py+16;
      ctx.save();if(w.hl||ptr.hl){ctx.shadowColor=w.color;ctx.shadowBlur=8;}
      ctx.fillStyle=w.color+'1a';ctx.strokeStyle=w.color+(w.hl?'':ptr.hl?'aa':'55');ctx.lineWidth=w.hl?2:1;
      ctx.fillRect(wx,wy,wordW,wordH);ctx.strokeRect(wx,wy,wordW,wordH);
      ctx.font=`9px 'IBM Plex Mono'`;ctx.fillStyle='rgba(255,178,41,.35)';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(w.label,wx+wordW/2,wy+2);
      ctx.font=`13px 'VT323'`;ctx.fillStyle=w.color;ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText(w.val,wx+wordW/2,wy+wordH-2);
      ctx.restore();
    });
    // total size label
    const totalW=ptr.words.length*(wordW+4);
    ctx.font=`9px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,178,41,.3)';ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(ptr.note,PAD,py+16+wordH+2);
  });

  // heap objects
  if(heapObjs&&heapObjs.length>0){
    const hx=CW*0.6,hy=28,hw=CW*0.38;
    ctx.font=`11px 'VT323'`;ctx.fillStyle='rgba(74,222,128,.4)';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('HEAP',hx,hy);
    heapObjs.forEach((o,i)=>{
      const oy=hy+16+i*40;
      ctx.save();ctx.fillStyle=o.color+'18';ctx.strokeStyle=o.color+'66';ctx.lineWidth=1;
      ctx.fillRect(hx,oy,hw,30);ctx.strokeRect(hx,oy,hw,30);
      ctx.font=`12px 'VT323'`;ctx.fillStyle=o.color;ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText(`${o.label}  (${o.size}B)`,hx+6,oy+15);ctx.restore();
    });
  }
}

/* ══════ PLAYBACK ══════ */
let ST={steps:[],idx:0,playing:false,timer:null,speed:520};
let curScene='escape';

function applyStep(step){
  renderFrame(step);
  const badge=document.getElementById('pbadge');
  const phase=step.phase||'init';
  badge.className='pbadge '+phase;badge.textContent=phase.toUpperCase();
  document.getElementById('step-txt').textContent=step.desc||'';
  document.getElementById('s-heap').textContent=step.heapBytes>0?(step.heapBytes>=1024?Math.round(step.heapBytes/1024)+'KB':step.heapBytes+'B'):'0B';
  document.getElementById('s-stack').textContent=step.stackBytes>0?(step.stackBytes>=1024?Math.round(step.stackBytes/1024)+'KB':step.stackBytes+'B'):'0B';
  document.getElementById('s-gor').textContent=step.goroutines||1;
  document.getElementById('s-gc').textContent=step.gcRuns||0;
  document.getElementById('s-esc').textContent=step.escaped||0;
  const pct=ST.steps.length>1?(ST.idx/(ST.steps.length-1))*100:0;
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('step-ctr').textContent=`${ST.idx+1} / ${ST.steps.length}`;
  renderCode(SCENARIOS[curScene].code,step.cl>=0?step.cl:-1);
  if(phase&&phase!=='init')snd(phase);
  if(phase==='gc'||phase==='free')triggerCA();
}

function next(){if(ST.idx<ST.steps.length-1){ST.idx++;applyStep(ST.steps[ST.idx]);}else if(ST.playing)pause();}
function prev(){if(ST.idx>0){ST.idx--;applyStep(ST.steps[ST.idx]);}}
function togglePlay(){if(ST.playing)pause();else play();snd('click');}
function play(){if(!ST.steps.length)return;if(ST.idx>=ST.steps.length-1)ST.idx=0;ST.playing=true;document.getElementById('play-btn').textContent='⏸ PAUSE';document.getElementById('play-btn').classList.add('playing');ST.timer=setInterval(()=>{if(ST.idx>=ST.steps.length-1){pause();return;}ST.idx++;applyStep(ST.steps[ST.idx]);},ST.speed);}
function pause(){ST.playing=false;clearInterval(ST.timer);document.getElementById('play-btn').textContent='▶ PLAY';document.getElementById('play-btn').classList.remove('playing');}
function doReset(){pause();ST.idx=0;if(ST.steps.length)applyStep(ST.steps[0]);snd('click');}
function changeSpeed(v){const m={1:1200,2:900,3:700,4:520,5:380,6:260,7:180,8:110,9:65,10:30};ST.speed=m[v]||380;if(ST.playing){clearInterval(ST.timer);ST.timer=setInterval(()=>{if(ST.idx>=ST.steps.length-1){pause();return;}ST.idx++;applyStep(ST.steps[ST.idx]);},ST.speed);}}

function selectScene(key){
  curScene=key;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.key===key));
  const sc=SCENARIOS[key];
  document.getElementById('cx-info').innerHTML=sc.cx;
  document.getElementById('how-info').innerHTML=sc.how;
  document.getElementById('facts').innerHTML=sc.facts;
  renderCode(sc.code,-1);
  if(ST.playing)pause();
  ST.steps=buildSteps(key);ST.idx=0;
  if(ST.steps.length){applyStep(ST.steps[0]);setTimeout(()=>play(),300);}
  snd('click');
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('boot').style.display!=='none')return;
  switch(e.key){
    case'ArrowRight':next();break;case'ArrowLeft':prev();break;
    case' ':e.preventDefault();togglePlay();break;
    case'r':case'R':doReset();break;case'm':case'M':toggleMute();break;
    case'1':selectScene('escape');break;case'2':selectScene('stackgrow');break;
    case'3':selectScene('gc');break;case'4':selectScene('layout');break;
    case'5':selectScene('pointers');break;
  }
});

function buildTabs(){
  const order=[['escape','1. ESCAPE ANALYSIS'],['stackgrow','2. STACK GROWTH'],['gc','3. TRI-COLOR GC'],['layout','4. STRUCT LAYOUT'],['pointers','5. FAT POINTERS']];
  document.getElementById('tabs').innerHTML=order.map(([k,l])=>`<button class="tab${k===curScene?' active':''}" data-key="${k}" onclick="selectScene('${k}')">${l}</button>`).join('');
}

function boot(){
  const term=document.getElementById('boot-terminal');const fill=document.getElementById('boot-fill');
  const lines=[{t:'MEM.VIZ v1.0 — INITIALIZING...',s:'',d:180},{t:'LOADING: ESCAPE_ANALYSIS.MOD',s:'OK',d:130},{t:'LOADING: STACK_GROWTH.MOD (contiguous stacks)',s:'OK',d:130},{t:'LOADING: GC_TRICOLOR.MOD (concurrent mark)',s:'OK',d:130},{t:'LOADING: STRUCT_LAYOUT.MOD (alignment)',s:'OK',d:120},{t:'LOADING: FAT_POINTERS.MOD (slice/iface)',s:'OK',d:120},{t:'GO MEMORY MODEL ONLINE.',s:'',d:200}];
  let li=0;
  function al(){if(li>=lines.length){setTimeout(sa,300);return;}const bl=lines[li];const div=document.createElement('div');div.className='bl';div.innerHTML=`<span>${bl.t}</span>${bl.s?`<span class="bl-ok">[${bl.s}]</span>`:'<span><span id="boot-cursor"></span></span>'}`;term.appendChild(div);requestAnimationFrame(()=>div.classList.add('show'));fill.style.width=Math.round((li/lines.length)*100)+'%';li++;setTimeout(al,bl.d);}al();
}
function sa(){document.getElementById('boot').style.display='none';document.getElementById('main').classList.add('show');buildTabs();const sc=SCENARIOS['escape'];document.getElementById('cx-info').innerHTML=sc.cx;document.getElementById('how-info').innerHTML=sc.how;document.getElementById('facts').innerHTML=sc.facts;renderCode(sc.code,-1);window.addEventListener('resize',resizeCanvas);resizeCanvas();setTimeout(()=>selectScene('escape'),300);}
boot();
</script>
