<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Radial glow behind title -->
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#955f3b" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#955f3b" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0d0a07" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="50%" stop-color="#0d0a07" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.45"/>
    </radialGradient>
  </defs>

  <!-- Dark base -->
  <rect width="1200" height="630" fill="#0d0a07"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative flow-field strokes (static representation of the hero) -->
  <g stroke-linecap="round" opacity="0.35">
    <g stroke="#c8a882" stroke-width="1">
      <line x1="60" y1="90"  x2="82" y2="85"/>
      <line x1="110" y1="140" x2="128" y2="148"/>
      <line x1="180" y1="95" x2="198" y2="108"/>
      <line x1="1080" y1="110" x2="1098" y2="102"/>
      <line x1="1020" y1="80"  x2="1040" y2="96"/>
      <line x1="1130" y1="160" x2="1148" y2="154"/>
      <line x1="80" y1="520" x2="100" y2="512"/>
      <line x1="140" y1="540" x2="160" y2="548"/>
      <line x1="1060" y1="530" x2="1082" y2="522"/>
      <line x1="1120" y1="560" x2="1140" y2="568"/>
      <line x1="200" y1="500" x2="222" y2="510"/>
      <line x1="990" y1="510" x2="1010" y2="518"/>
      <line x1="50" y1="300" x2="70" y2="310"/>
      <line x1="1140" y1="300" x2="1160" y2="292"/>
    </g>
    <g stroke="#b8946a" stroke-width="1.3" opacity="0.55">
      <line x1="150" y1="200" x2="175" y2="208"/>
      <line x1="1020" y1="220" x2="1045" y2="210"/>
      <line x1="90" y1="420" x2="115" y2="430"/>
      <line x1="1050" y1="440" x2="1075" y2="432"/>
    </g>
  </g>

  <!-- Main title with RGB chromatic split (pure red + pure blue offset, white core on top) -->
  <g font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif" font-weight="900" text-anchor="middle" letter-spacing="-2">
    <text x="590" y="338" font-size="144" fill="#ff0000" opacity="0.85">STAN SOBOLEV</text>
    <text x="610" y="338" font-size="144" fill="#0066ff" opacity="0.85">STAN SOBOLEV</text>
    <text x="600" y="338" font-size="144" fill="#ffffff">STAN SOBOLEV</text>
  </g>

  <!-- Tagline -->
  <text x="600" y="410" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400"
        font-size="26" fill="#a89c8e" text-anchor="middle" letter-spacing="3">
    STAFF ENGINEER &#x2022; SYSTEM ARCHITECT &#x2022; MENTOR
  </text>

  <!-- Horizontal accent rule -->
  <line x1="480" y1="450" x2="720" y2="450" stroke="#c8a882" stroke-width="1" opacity="0.55"/>

  <!-- Short description -->
  <text x="600" y="495" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300"
        font-size="22" fill="#8c8376" text-anchor="middle">
    Fifteen years building distributed systems at planetary scale
  </text>

  <!-- URL -->
  <text x="600" y="568" font-family="'Courier New', Courier, monospace" font-weight="700"
        font-size="20" fill="#c8a882" text-anchor="middle" letter-spacing="4">
    IAMJACKE.COM
  </text>

  <!-- Vignette on top -->
  <rect width="1200" height="630" fill="url(#vignette)"/>
</svg>
